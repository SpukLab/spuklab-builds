<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>BinauralSpray · Spuklab</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600&family=JetBrains+Mono:ital,wght@1,300;1,400;1,800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root { --cyan:#00ffff; --mag:#ff00ff; --vio:#9944ff; --border:rgba(153,68,255,0.18); --warn:#ff5500; }
html,body { width:100%; height:100%; overflow:hidden; touch-action:none; background:linear-gradient(155deg,#13111f 0%,#1b1726 100%); }
body::before { content:''; position:fixed; inset:0; z-index:0;
  background:radial-gradient(ellipse 60% 50% at 15% 50%,rgba(0,255,255,0.04) 0%,transparent 65%),
             radial-gradient(ellipse 60% 50% at 85% 50%,rgba(255,0,255,0.04) 0%,transparent 65%),
             radial-gradient(ellipse 80% 50% at 50% 100%,rgba(153,68,255,0.06) 0%,transparent 55%);
  pointer-events:none; }
#app { display:flex; flex-direction:column; height:100dvh;
  padding-top:env(safe-area-inset-top); padding-bottom:env(safe-area-inset-bottom);
  position:relative; z-index:1; font-family:'Inter',-apple-system,sans-serif; }
#hdr { flex-shrink:0; height:50px; display:flex; align-items:center; justify-content:space-between;
  padding:0 18px; background:rgba(20,15,35,0.70); border-bottom:1px solid var(--border);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); position:relative; z-index:10; }
.logo .wordmark { display:flex; align-items:baseline; gap:2px; }
.logo .b { font-family:'JetBrains Mono',monospace; font-style:italic; font-weight:800; font-size:16px; color:rgba(255,255,255,0.92); }
.logo .s { font-family:'JetBrains Mono',monospace; font-style:italic; font-weight:300; font-size:16px;
  background:linear-gradient(90deg,var(--cyan) 0%,var(--vio) 55%,var(--mag) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.logo small { font-family:'JetBrains Mono',monospace; font-style:italic; font-weight:300; font-size:6.5px;
  color:rgba(255,255,255,0.25); letter-spacing:3px; display:block; margin-top:3px; text-transform:uppercase; }
.hc { display:flex; align-items:center; gap:8px; }
#gcnt { font-family:'JetBrains Mono',monospace; font-style:italic; font-weight:300; font-size:8px; letter-spacing:1px; color:rgba(255,255,255,0.28); font-variant-numeric:tabular-nums; }
.dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.14); transition:all .3s; }
.dot.on  { background:var(--cyan); border-color:var(--cyan); box-shadow:0 0 10px var(--cyan); }
.dot.rec { background:var(--mag);  border-color:var(--mag);  box-shadow:0 0 10px var(--mag); }
#clip-dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.14); transition:all .08s; }
#clip-dot.hot { background:var(--warn); border-color:var(--warn); box-shadow:0 0 8px var(--warn); }
#cw { flex:1 1 0; min-height:0; position:relative; overflow:hidden; cursor:crosshair;
  margin:10px 12px 0; border-radius:18px; border:1px solid rgba(153,68,255,0.16);
  background:rgba(153,68,255,0.05);
  box-shadow:0 0 0 1px rgba(255,255,255,0.03) inset,0 8px 32px rgba(0,0,0,0.5),0 0 40px rgba(153,68,255,0.05); }
#viz { width:100%; height:100%; display:block; border-radius:17px; }
#hint { position:absolute; bottom:14px; left:50%; transform:translateX(-50%);
  font-family:'JetBrains Mono',monospace; font-style:italic; font-weight:300;
  font-size:8px; letter-spacing:5px; color:rgba(255,255,255,0.20);
  text-transform:uppercase; white-space:nowrap; pointer-events:none; transition:opacity .8s; }
#hint.gone { opacity:0; }
#orb-row { display:flex; gap:5px; padding:8px 12px 0; flex-shrink:0; }
.obtn { flex:1; background:rgba(153,68,255,0.07); border:1px solid rgba(153,68,255,0.14);
  color:rgba(255,255,255,0.30); font-family:'JetBrains Mono',monospace; font-style:italic;
  font-size:8.5px; letter-spacing:1px; padding:7px 4px; cursor:pointer; text-transform:uppercase;
  transition:all .18s; text-align:center; border-radius:9px; }
.obtn.active { background:rgba(153,68,255,0.18); border-color:rgba(153,68,255,0.45); color:#b580ff; box-shadow:0 0 12px rgba(153,68,255,0.15); }
#ctrl { flex-shrink:0; background:rgba(20,15,35,0.60); border-top:1px solid var(--border);
  padding:10px 12px 10px; display:flex; flex-direction:column; gap:7px;
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); margin-top:8px; }
.sec-label { display:flex; align-items:center; gap:8px; }
.sec-label .sl { font-family:'JetBrains Mono',monospace; font-style:italic; font-weight:300;
  font-size:7px; letter-spacing:3px; color:rgba(255,255,255,0.25); text-transform:uppercase; white-space:nowrap; }
.sec-label .sline { flex:1; height:1px; background:linear-gradient(90deg,rgba(153,68,255,0.18),transparent); }
.sec-label .sline.rev { background:linear-gradient(270deg,rgba(153,68,255,0.18),transparent); }
.knob-row { display:flex; justify-content:space-around; align-items:flex-start; }
.kw { display:flex; flex-direction:column; align-items:center; gap:3px; cursor:ns-resize; user-select:none; -webkit-user-select:none; flex:1; }
.klab { font-family:'JetBrains Mono',monospace; font-style:italic; font-weight:300; font-size:6.5px; letter-spacing:1.5px; color:rgba(255,255,255,0.35); text-transform:uppercase; text-align:center; line-height:1.4; }
.kval { font-family:'JetBrains Mono',monospace; font-style:italic; font-size:10px; letter-spacing:1px; color:rgba(255,255,255,0.52); font-variant-numeric:tabular-nums; }
.btn { background:rgba(153,68,255,0.07); border:1px solid rgba(153,68,255,0.16); color:rgba(255,255,255,0.40);
  font-family:'JetBrains Mono',monospace; font-style:italic; font-weight:300; font-size:8.5px; letter-spacing:2px;
  padding:9px 10px; border-radius:9px; cursor:pointer; text-transform:uppercase; transition:all .15s; position:relative; }
.btn.on  { background:rgba(0,255,255,0.08); border-color:rgba(0,255,255,0.35); color:var(--cyan); box-shadow:0 0 14px rgba(0,255,255,0.10); }
.btn.rec { background:rgba(255,0,255,0.08); border-color:rgba(255,0,255,0.35); color:var(--mag); box-shadow:0 0 14px rgba(255,0,255,0.10); }
.btn-row { display:flex; gap:6px; }
.btn-row .btn { flex:1; padding:10px 4px; font-size:8.5px; }
.btn-row .btn.wide { flex:2; }
.preset-row { display:flex; gap:4px; }
.pbtn { flex:1; background:rgba(153,68,255,0.06); border:1px solid rgba(153,68,255,0.13); color:rgba(255,255,255,0.22);
  font-family:'JetBrains Mono',monospace; font-style:italic; font-weight:300; font-size:8px; letter-spacing:1px;
  padding:8px 2px; border-radius:8px; cursor:pointer; text-transform:uppercase; transition:all .15s; text-align:center; }
.pbtn.saved   { border-color:rgba(153,68,255,0.22); color:rgba(255,255,255,0.45); }
.pbtn.active  { background:rgba(0,255,255,0.07); border-color:rgba(0,255,255,0.35); color:var(--cyan); }
.pbtn.holding { border-color:var(--warn); color:var(--warn); }
input[type=file] { display:none; }
#ov { position:absolute; inset:0; border-radius:17px; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:14px; pointer-events:none; transition:opacity .5s; }
#ov.gone { opacity:0; }
.ov-i { font-size:24px; opacity:.25; color:var(--cyan); }
.ov-t { font-family:'JetBrains Mono',monospace; font-style:italic; font-weight:300; font-size:9px; letter-spacing:4px;
  color:rgba(255,255,255,0.22); text-transform:uppercase; text-align:center; line-height:2.4; }
#countdown { position:absolute; inset:0; border-radius:17px; display:flex; align-items:center; justify-content:center;
  pointer-events:none; opacity:0; transition:opacity .2s; z-index:20;
  background:rgba(0,0,0,0.35); backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px); }
#countdown.show { opacity:1; }
#countdown-num { font-family:'JetBrains Mono',monospace; font-style:italic; font-weight:800;
  font-size:clamp(80px,25vw,130px); color:rgba(255,255,255,0.90); letter-spacing:-4px; line-height:1;
  text-shadow:0 0 40px rgba(153,68,255,0.7),0 0 80px rgba(153,68,255,0.3); }
/* VU meter */
#mic-vu { display:none; align-items:flex-end; justify-content:center; gap:2px;
  position:absolute; bottom:4px; left:50%; transform:translateX(-50%); height:10px; }
#mic-vu.active { display:flex; }
#mic-vu span { width:3px; border-radius:1px; background:var(--mag); height:2px; transition:height .08s; }
/* LIBRARY SHEET */
#lib-overlay { position:fixed; inset:0; z-index:100; background:rgba(0,0,0,0); pointer-events:none; transition:background .3s; }
#lib-overlay.open { background:rgba(0,0,0,0.55); pointer-events:all; }
#lib-sheet { position:fixed; bottom:0; left:0; right:0; z-index:101;
  background:linear-gradient(180deg,#1a1530 0%,#13111f 100%);
  border-top:1px solid rgba(153,68,255,0.25); border-radius:22px 22px 0 0;
  padding-bottom:env(safe-area-inset-bottom);
  transform:translateY(100%); transition:transform .35s cubic-bezier(.32,.72,0,1);
  max-height:72vh; display:flex; flex-direction:column;
  box-shadow:0 -8px 40px rgba(0,0,0,0.6); }
#lib-sheet.open { transform:translateY(0); }
.sheet-handle { width:36px; height:4px; border-radius:2px; background:rgba(255,255,255,0.15); margin:12px auto 0; flex-shrink:0; }
.sheet-header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px 8px; flex-shrink:0; }
.sheet-title { font-family:'JetBrains Mono',monospace; font-style:italic; font-weight:800; font-size:13px; color:rgba(255,255,255,0.85); }
.sheet-count { font-family:'JetBrains Mono',monospace; font-style:italic; font-weight:300; font-size:9px; color:rgba(153,68,255,0.7); }
.sheet-close { font-family:'JetBrains Mono',monospace; font-style:italic; font-size:11px; color:rgba(255,255,255,0.35); background:none; border:none; cursor:pointer; padding:4px 8px; }
#takes-list { overflow-y:auto; flex:1; padding:0 12px 16px; -webkit-overflow-scrolling:touch; }
#takes-list:empty::after { content:'NO TAKES YET'; display:block; text-align:center; margin-top:32px;
  font-family:'JetBrains Mono',monospace; font-style:italic; font-size:9px; letter-spacing:.2em; color:rgba(255,255,255,0.15); }
.take-item { display:flex; align-items:center; gap:8px; padding:10px 12px; margin-bottom:6px;
  background:rgba(153,68,255,0.06); border:1px solid rgba(153,68,255,0.12); border-radius:12px; }
.take-item.playing { background:rgba(153,68,255,0.14); border-color:rgba(153,68,255,0.35); }
.take-info { flex:1; min-width:0; }
.take-name { font-family:'JetBrains Mono',monospace; font-style:italic; font-size:9px; letter-spacing:.1em;
  color:rgba(255,255,255,0.75); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-transform:uppercase; }
.take-meta { font-family:'JetBrains Mono',monospace; font-style:italic; font-size:7.5px; color:rgba(255,255,255,0.30); margin-top:2px; }
.take-actions { display:flex; gap:5px; flex-shrink:0; }
.tact { width:30px; height:30px; border-radius:8px; border:1px solid rgba(153,68,255,0.18);
  background:rgba(153,68,255,0.08); color:rgba(255,255,255,0.50); font-size:13px;
  cursor:pointer; display:flex; align-items:center; justify-content:center; }
.tact.tact-load   { border-color:rgba(0,255,255,0.25); color:rgba(0,255,255,0.70); }
.tact.tact-export { border-color:rgba(153,68,255,0.25); color:rgba(153,68,255,0.80); }
.tact.tact-del    { border-color:rgba(255,0,255,0.20); color:rgba(255,0,255,0.60); }
</style>
</head>
<body>
<div id="app">
  <header id="hdr">
    <div class="logo">
      <div class="wordmark"><span class="b">BINAURAL</span><span class="s">Spray</span></div>
      <small>SPUKLAB · AUV3 · V1.0</small>
    </div>
    <div class="hc"><span id="gcnt">0 g/s</span><div id="clip-dot"></div><div class="dot" id="dot"></div></div>
  </header>

  <div id="cw">
    <canvas id="viz"></canvas>
    <div id="ov"><div class="ov-i">◈</div><div class="ov-t">Load audio or use Mic<br>to begin</div></div>
    <div id="hint">touch · drag · spray</div>
    <div id="countdown"><span id="countdown-num">3</span></div>
  </div>

  <div id="orb-row">
    <button class="obtn active" data-mode="0">Free</button>
    <button class="obtn" data-mode="1">Ping</button>
    <button class="obtn" data-mode="2">Pulse</button>
    <button class="obtn" data-mode="3">Scan</button>
    <button class="obtn" data-mode="4">Spiral</button>
  </div>

  <div id="ctrl">
    <div class="sec-label"><div class="sline rev"></div><span class="sl">Output</span><div class="sline"></div></div>
    <div class="knob-row" style="justify-content:center;align-items:center;gap:14px">
      <div class="kw" data-p="hiCut" style="flex:0 0 auto"><canvas width="58" height="58"></canvas><div class="klab">Hi<br>Cut</div><div class="kval">100%</div></div>
      <div class="kw" data-p="dryWet" style="flex:0 0 auto"><canvas width="86" height="86"></canvas><div class="klab" style="font-size:7px;letter-spacing:2px;color:rgba(153,68,255,0.7)">DRY ← · → WET</div><div class="kval" style="font-size:15px;color:#00ffff">0%</div></div>
      <div class="kw" data-p="masterVol" style="flex:0 0 auto"><canvas width="58" height="58"></canvas><div class="klab">Master<br>Vol</div><div class="kval">70%</div></div>
    </div>
    <div class="sec-label"><div class="sline rev"></div><span class="sl">Granular</span><div class="sline"></div></div>
    <div class="knob-row">
      <div class="kw" data-p="chopDensity"><canvas width="54" height="54"></canvas><div class="klab">Chop<br>Dens</div><div class="kval">0%</div></div>
      <div class="kw" data-p="binauralDisp"><canvas width="54" height="54"></canvas><div class="klab">Bin<br>Disp</div><div class="kval">0%</div></div>
      <div class="kw" data-p="glitchProb"><canvas width="54" height="54"></canvas><div class="klab">Glitch<br>Prob</div><div class="kval">0%</div></div>
      <div class="kw" data-p="feedback"><canvas width="54" height="54"></canvas><div class="klab">Feed<br>back</div><div class="kval">0%</div></div>
      <div class="kw" data-p="particleVel"><canvas width="54" height="54"></canvas><div class="klab">Part<br>Vel</div><div class="kval">30%</div></div>
      <div class="kw" data-p="pitch"><canvas width="54" height="54"></canvas><div class="klab">Pitch</div><div class="kval">0st</div></div>
    </div>
    <div class="btn-row">
      <button class="btn wide" id="load-btn">▶ Load Audio</button>
      <button class="btn" id="mic-btn" style="padding-bottom:16px;">Mic<div id="mic-vu"><span></span><span></span><span></span><span></span><span></span></div></button>
    </div>
    <div class="btn-row">
      <button class="btn" id="rec-btn" style="flex:2;border-radius:20px;letter-spacing:3px;">○ REC</button>
      <div id="rec-time" style="flex:1;display:flex;align-items:center;justify-content:center;font-size:11px;letter-spacing:2px;color:var(--mag);font-family:'JetBrains Mono',monospace;font-style:italic;"></div>
      <button class="btn" id="lib-btn" style="flex:1">Library</button>
      <button class="btn" id="init-btn" style="flex:1">Init</button>
    </div>
    <div class="sec-label"><div class="sline rev"></div><span class="sl">Presets</span><div class="sline"></div><span class="sl" style="color:rgba(255,255,255,0.15)">hold=save</span></div>
    <div class="preset-row" id="preset-row">
      <button class="pbtn" data-slot="0">P1</button><button class="pbtn" data-slot="1">P2</button>
      <button class="pbtn" data-slot="2">P3</button><button class="pbtn" data-slot="3">P4</button>
      <button class="pbtn" data-slot="4">P5</button>
    </div>
    <input type="file" id="file-in" accept=".mp3,.wav,.m4a,.aiff,.aif,.ogg,.flac,.caf,audio/*">
  </div>
</div>

<div id="lib-overlay"></div>
<div id="lib-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <span class="sheet-title">LIBRARY</span>
    <span class="sheet-count" id="take-count">0 takes</span>
    <button class="sheet-close" id="lib-close">✕</button>
  </div>
  <div id="takes-list"></div>
</div>

<script>
'use strict';

// ── PARAMS ──
const P = {
  masterVol:0.70, dryWet:0.00, hiCut:1.00,
  chopDensity:0.00, binauralDisp:0.00, glitchProb:0.00,
  feedback:0.00, particleVel:0.30, pitch:0.50, orbMode:0
};
const PARAM_KEYS = Object.keys(P);

// ── INDEXEDDB ──
const DB_NAME='BinauralSprayLib', DB_VER=1, STORE='takes';
let db=null;
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,DB_VER);r.onupgradeneeded=e=>e.target.result.createObjectStore(STORE,{keyPath:'id'});r.onsuccess=e=>{db=e.target.result;res(db);};r.onerror=()=>rej(r.error);});}
function dbSave(t){return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).put(t).onsuccess=()=>res();tx.onerror=()=>rej(tx.error);});}
function dbGetAll(){return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readonly'),r=tx.objectStore(STORE).getAll();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
function dbDelete(id){return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).delete(id).onsuccess=()=>res();tx.onerror=()=>rej(tx.error);});}

// ── AUDIO STATE ──
let AC=null, audioBuf=null, running=false;
let masterGain=null, dryGain=null, wetGain=null, dryPanner=null;
let fbDelay=null, fbGain=null, hiCutFilter=null, outputGain=null;
let limiter=null, safetyShaperNode=null;
let analyserOut=null, analyserL=null, analyserR=null, drySource=null;
let nextGrainT=0, grainTimer=null, grainCount=0, grainCountReset=0;
let recorderNode=null, recorderChunks=[], recorderChunksR=[];
let recIsRunning=false, recStartTime=0, recSampleRate=44100, recTimerID=null;
let sourceFileName='DEMO';
let sprayActive=false, sprayX=0.5, sprayY=0.5, sprayForce=0, clipHoldFrames=0;
let previewSource=null, previewingId=null;

// ── MIC STATE ──
let micStream=null, micRecording=false;
let micAnalyser=null, micVuTimer=null;
let micProcNode=null, micChunksL=[], micChunksR=[], micSampleRate=44100;

// ── AUDIO INIT ──
function makeSafetyCurve(){const n=256,c=new Float32Array(n);for(let i=0;i<n;i++){const x=(i*2)/(n-1)-1;c[i]=Math.tanh(x*1.5)/Math.tanh(1.5);}return c;}

function initAC(){
  if(AC)return;
  AC=new(window.AudioContext||window.webkitAudioContext)();
  dryGain=AC.createGain(); dryGain.gain.value=1-P.dryWet;
  dryPanner=AC.createPanner(); dryPanner.panningModel='HRTF'; dryPanner.distanceModel='linear'; dryPanner.rolloffFactor=0; dryPanner.refDistance=1;
  try{dryPanner.setPosition(0,0,-1);}catch(e){}
  try{if(AC.listener.positionX){AC.listener.positionX.value=0;AC.listener.positionY.value=0;AC.listener.positionZ.value=0;AC.listener.forwardX.value=0;AC.listener.forwardY.value=0;AC.listener.forwardZ.value=-1;AC.listener.upX.value=0;AC.listener.upY.value=1;AC.listener.upZ.value=0;}else{AC.listener.setPosition(0,0,0);AC.listener.setOrientation(0,0,-1,0,1,0);}}catch(e){}
  wetGain=AC.createGain(); wetGain.gain.value=P.dryWet;
  masterGain=AC.createGain(); masterGain.gain.value=0.85;
  fbDelay=AC.createDelay(3.0); fbDelay.delayTime.value=0.30;
  fbGain=AC.createGain(); fbGain.gain.value=P.feedback*0.78*0.77;
  fbDelay.connect(fbGain); fbGain.connect(fbDelay); fbGain.connect(masterGain);
  hiCutFilter=AC.createBiquadFilter(); hiCutFilter.type='lowpass'; hiCutFilter.frequency.value=hiCutHz(P.hiCut); hiCutFilter.Q.value=0.5;
  outputGain=AC.createGain(); outputGain.gain.value=P.masterVol*2.0;
  limiter=AC.createDynamicsCompressor(); limiter.threshold.value=-1.0; limiter.knee.value=0.0; limiter.ratio.value=20.0; limiter.attack.value=0.001; limiter.release.value=0.10;
  safetyShaperNode=AC.createWaveShaper(); safetyShaperNode.curve=makeSafetyCurve(); safetyShaperNode.oversample='4x';
  analyserOut=AC.createAnalyser(); analyserOut.fftSize=2048; analyserOut.smoothingTimeConstant=0.88;
  const spl=AC.createChannelSplitter(2);
  analyserL=AC.createAnalyser(); analyserL.fftSize=512; analyserL.smoothingTimeConstant=0.9;
  analyserR=AC.createAnalyser(); analyserR.fftSize=512; analyserR.smoothingTimeConstant=0.9;

  // ── REC node creado en initAC — parte del chain desde el inicio ──
  recorderNode=AC.createScriptProcessor(4096,2,2);
  recorderNode.onaudioprocess=e=>{
    if(!recIsRunning)return;
    recorderChunks.push(new Float32Array(e.inputBuffer.getChannelData(0)));
    recorderChunksR.push(new Float32Array(e.inputBuffer.getChannelData(1)));
  };

  // Routing
  dryGain.connect(dryPanner); dryPanner.connect(masterGain);
  wetGain.connect(masterGain);
  masterGain.connect(hiCutFilter); hiCutFilter.connect(outputGain); outputGain.connect(limiter);
  limiter.connect(safetyShaperNode); safetyShaperNode.connect(analyserOut);
  // recorderNode en el chain permanente: analyserOut → recorderNode → destination
  analyserOut.connect(recorderNode);
  recorderNode.connect(AC.destination);
  // path directo para el audio — recorderNode es solo tap, no bloquea
  analyserOut.connect(AC.destination);
  // analysers L/R
  safetyShaperNode.connect(spl); spl.connect(analyserL,0); spl.connect(analyserR,1);
}

function decodeAudio(ab){return new Promise((res,rej)=>{try{AC.decodeAudioData(ab.slice(0),buf=>res(buf),err=>rej(err||new Error('decode')));}catch(e){rej(e);}});}

function startDrySource(){
  stopDrySource(); if(!audioBuf||!AC)return;
  drySource=AC.createBufferSource(); drySource.buffer=audioBuf; drySource.loop=true;
  const st=(P.pitch*2-1)*24; drySource.playbackRate.value=Math.pow(2,st/12);
  drySource.connect(dryGain); drySource.start();
}
function stopDrySource(){if(drySource){try{drySource.stop();}catch(e){}try{drySource.disconnect();}catch(e){}drySource=null;}}

function fireGrain(when){
  if(!audioBuf||!AC)return;
  if(Math.random()<P.glitchProb*0.38)return;
  const grainDur=Math.max(0.018,0.42-P.chopDensity*0.38);
  const maxStart=Math.max(0,audioBuf.duration-grainDur);
  const startPos=sprayActive?sprayY*maxStart:Math.random()*maxStart;
  const vel=0.38+P.particleVel*1.9;
  const pitchSt=(P.pitch*2-1)*24, pitchRate=Math.pow(2,pitchSt/12);
  const rate=vel*(1+(Math.random()-0.5)*0.18)*pitchRate;
  const centerPan=sprayActive?(sprayX*2-1):0;
  let basePan=centerPan+(Math.random()*2-1)*P.binauralDisp;
  if(Math.random()<P.glitchProb*0.1)basePan=Math.random()>0.5?1:-1;
  const pan=Math.max(-1,Math.min(1,basePan));
  const src=AC.createBufferSource(); src.buffer=audioBuf; src.playbackRate.value=rate;
  const env=AC.createGain();
  const att=grainDur*0.12, rel=grainDur*0.25;
  env.gain.setValueAtTime(0,when); env.gain.linearRampToValueAtTime(0.65,when+att);
  env.gain.setValueAtTime(0.65,when+grainDur-rel); env.gain.linearRampToValueAtTime(0,when+grainDur);
  const panner=AC.createPanner(); panner.panningModel='HRTF'; panner.distanceModel='linear'; panner.rolloffFactor=0; panner.refDistance=1;
  const ga=pan*Math.PI*0.5, gx=Math.sin(ga), gz=-Math.cos(ga);
  try{if(panner.positionX){panner.positionX.value=gx;panner.positionY.value=0;panner.positionZ.value=gz;}else{panner.setPosition(gx,0,gz);}}catch(e){}
  src.connect(panner); panner.connect(env); env.connect(wetGain); env.connect(fbDelay);
  src.start(when,startPos,grainDur);
  grainCount++; emitParticle(pan,vel);
}

function startScheduler(){
  if(grainTimer)return; nextGrainT=AC.currentTime+0.05; grainCountReset=performance.now();
  function tick(){
    if(!audioBuf)return;
    const base=3+P.chopDensity*64, rate=sprayActive?base*(1+sprayForce*1.5):base, period=1/rate;
    while(nextGrainT<AC.currentTime+0.11){fireGrain(nextGrainT);nextGrainT+=period+(Math.random()-0.5)*period*0.28;}
    const now=performance.now();
    if(now-grainCountReset>1000){document.getElementById('gcnt').textContent=grainCount+' g/s';grainCount=0;grainCountReset=now;}
  }
  grainTimer=setInterval(tick,28);
}
function stopScheduler(){if(grainTimer){clearInterval(grainTimer);grainTimer=null;}document.getElementById('gcnt').textContent='0 g/s';}

async function saveMicChunks(){
  if(!micChunksL.length){setInfo('MIC · SIN DATOS');return;}
  const total=micChunksL.reduce((a,c)=>a+c.length,0);
  const L=new Float32Array(total), R=new Float32Array(total);
  let off=0;
  for(let i=0;i<micChunksL.length;i++){L.set(micChunksL[i],off);R.set(micChunksR[i],off);off+=micChunksL[i].length;}
  micChunksL=[]; micChunksR=[];
  // Normalizar volumen — encontrar peak y escalar a 0.9
  let peak=0;
  for(let i=0;i<total;i++){const v=Math.abs(L[i]);if(v>peak)peak=v;}
  for(let i=0;i<total;i++){const v=Math.abs(R[i]);if(v>peak)peak=v;}
  const gain=peak>0.001?(0.9/peak):1;
  for(let i=0;i<total;i++){L[i]=Math.max(-1,Math.min(1,L[i]*gain));R[i]=Math.max(-1,Math.min(1,R[i]*gain));}
  const buf=AC.createBuffer(2,total,micSampleRate);
  buf.getChannelData(0).set(L); buf.getChannelData(1).set(R);
  const wav=audioBufferToWav(buf);
  const ts=Date.now(), now=new Date();
  const hhmm=String(now.getHours()).padStart(2,'0')+String(now.getMinutes()).padStart(2,'0');
  const name='MIC_'+hhmm;
  await dbSave({id:ts,name,ts,wav,duration:buf.duration});
  audioBuf=buf; sourceFileName=name;
  document.getElementById('ov').classList.add('gone');
  setInfo(name+' · '+buf.duration.toFixed(1)+'s — READY');
  if(running)startDrySource(); else go();
  flashLib();
}

// ── WAV HELPERS ──
function audioBufferToWav(buf){
  const nCh=buf.numberOfChannels, sr=buf.sampleRate, len=buf.length;
  const bps=4, ba=nCh*bps, br=sr*ba, ds=len*nCh*bps;
  const ab=new ArrayBuffer(44+ds), view=new DataView(ab);
  const ws=(o,s)=>{for(let i=0;i<s.length;i++)view.setUint8(o+i,s.charCodeAt(i));};
  ws(0,'RIFF'); view.setUint32(4,36+ds,true); ws(8,'WAVE'); ws(12,'fmt ');
  view.setUint32(16,16,true); view.setUint16(20,3,true); view.setUint16(22,nCh,true);
  view.setUint32(24,sr,true); view.setUint32(28,br,true); view.setUint16(32,ba,true);
  view.setUint16(34,32,true); ws(36,'data'); view.setUint32(40,ds,true);
  let pos=44;
  for(let i=0;i<len;i++) for(let c=0;c<nCh;c++){view.setFloat32(pos,buf.getChannelData(c)[i],true);pos+=4;}
  return ab;
}

function applyParam(p,v){
  if(!AC)return;
  if(p==='masterVol'&&outputGain)outputGain.gain.setTargetAtTime(v*2.0,AC.currentTime,0.04);
  if(p==='dryWet'){if(dryGain)dryGain.gain.setTargetAtTime(1-v,AC.currentTime,0.05);if(wetGain)wetGain.gain.setTargetAtTime(v,AC.currentTime,0.05);}
  if(p==='hiCut'&&hiCutFilter)hiCutFilter.frequency.setTargetAtTime(hiCutHz(v),AC.currentTime,0.05);
  if(p==='feedback'&&fbGain)fbGain.gain.setTargetAtTime(v*0.78*0.77,AC.currentTime,0.06);
  if(p==='binauralDisp'&&fbDelay)fbDelay.delayTime.setTargetAtTime(0.20+v*0.35,AC.currentTime,0.1);
  if(p==='pitch'&&drySource){const st=(v*2-1)*24;drySource.playbackRate.setTargetAtTime(Math.pow(2,st/12),AC.currentTime,0.05);}
}
function setDryPan(nx){

async function saveToLibrary(){

  const L=new Float32Array(total), R=new Float32Array(total);
  let off=0; for(let i=0;i<recorderChunks.length;i++){L.set(recorderChunks[i],off);R.set(recorderChunksR[i],off);off+=recorderChunks[i].length;}
  const interleaved=new Float32Array(total*2);
  for(let i=0;i<total;i++){interleaved[i*2]=Math.max(-1,Math.min(1,L[i]));interleaved[i*2+1]=Math.max(-1,Math.min(1,R[i]));}
  const bps=4,nCh=2,br=recSampleRate*nCh*bps,ba=nCh*bps,ds=interleaved.length*bps;
  const ab=new ArrayBuffer(44+ds), view=new DataView(ab);
  const ws=(o,s)=>{for(let i=0;i<s.length;i++)view.setUint8(o+i,s.charCodeAt(i));};
  ws(0,'RIFF'); view.setUint32(4,36+ds,true); ws(8,'WAVE'); ws(12,'fmt ');
  view.setUint32(16,16,true); view.setUint16(20,3,true); view.setUint16(22,nCh,true);
  view.setUint32(24,recSampleRate,true); view.setUint32(28,br,true); view.setUint16(32,ba,true);
  view.setUint16(34,32,true); ws(36,'data'); view.setUint32(40,ds,true);
  let pos=44; for(let i=0;i<interleaved.length;i++){view.setFloat32(pos,interleaved[i],true);pos+=4;}
  const ts=Date.now(), now=new Date(), hhmm=String(now.getHours()).padStart(2,'0')+String(now.getMinutes()).padStart(2,'0');
  const name='BS_'+sourceFileName+'_'+hhmm;
  await dbSave({id:ts,name,ts,wav:ab,duration:total/recSampleRate});
  recorderChunks=[]; recorderChunksR=[];
  flashLib();

// ── PARTICLES ──
const pts=[],MAX_P=400,ripples=[],MAX_R=12;
function panColor(nx){if(nx<0.42){const t=nx/0.42;return{r:Math.round(t*80),g:Math.round(180+t*50),b:255};}else if(nx>0.58){const t=(nx-0.58)/0.42;return{r:255,g:Math.round(20-t*20),b:Math.round(180-t*180)};}else{return{r:140,g:0,b:255};}}
function spawnRipple(nx,ny,energy){const vz=document.getElementById('viz'),c=panColor(nx);ripples.push({x:nx*vz.width,y:ny*vz.height,r:0,maxR:(80+energy*180)*devicePixelRatio,life:1.0,decay:0.028+energy*0.012,r2:c.r,g2:c.g,b2:c.b});if(ripples.length>MAX_R)ripples.shift();}
function emitParticle(pan,vel){
  const vz=document.getElementById('viz'),w=vz.width,h=vz.height;
  const nx=sprayActive?sprayX:(pan+1)/2, ny=sprayActive?sprayY:0.5+(Math.random()-0.5)*0.15;
  const c=panColor(nx), ba=sprayActive?-Math.PI/2+(Math.random()-0.5)*Math.PI*0.9:Math.random()*Math.PI*2;
  const spd=(vel*4+1.5+Math.random()*2)*devicePixelRatio;
  pts.push({x:nx*w,y:ny*h,px:nx*w,py:ny*h,vx:Math.cos(ba)*spd*(0.5+Math.random()*0.8),vy:Math.sin(ba)*spd*(0.5+Math.random()*0.8),life:1.0,decay:0.014+Math.random()*0.022,sz:(1.2+Math.random()*2.8+vel*1.8)*devicePixelRatio,r:c.r,g:c.g,b:c.b});
  if(pts.length>MAX_P)pts.shift();
}

// ── CANVAS ──
const viz=document.getElementById('viz'), vc=viz.getContext('2d');
function resize(){const wr=document.getElementById('cw');viz.width=wr.clientWidth*devicePixelRatio;viz.height=wr.clientHeight*devicePixelRatio;}
window.addEventListener('resize',resize); resize();
const fdO=new Uint8Array(1024), clipData=new Float32Array(2048);
function checkClipping(){if(!analyserOut)return false;analyserOut.getFloatTimeDomainData(clipData);for(let i=0;i<clipData.length;i++){if(Math.abs(clipData[i])>0.96)return true;}return false;}

function render(){
  requestAnimationFrame(render); const w=viz.width,h=viz.height;
  vc.fillStyle='rgba(16,12,28,0.18)'; vc.fillRect(0,0,w,h);
  if(!running){drawBinBg(w,h);drawIdleOrb(w,h);drawParts(w,h);return;}
  analyserOut.getByteFrequencyData(fdO);
  const energy=fdO.reduce((a,v)=>a+v,0)/fdO.length/255;
  const isClip=checkClipping(); const cd=document.getElementById('clip-dot');
  if(isClip){cd.classList.add('hot');clipHoldFrames=18;}else if(clipHoldFrames>0){clipHoldFrames--;if(!clipHoldFrames)cd.classList.remove('hot');}
  if(sprayActive&&Math.random()<0.14)spawnRipple(sprayX,sprayY,energy+0.25);
  if(!sprayActive&&energy>0.05&&Math.random()<energy*0.28)spawnRipple(0.5,0.5,energy);
  sprayForce*=0.91;
  drawBinBg(w,h); drawGrid(w,h); drawRipples(w,h,energy); drawParts(w,h); drawCentralOrb(w,h,energy); drawHUD(w,h);
}

function drawGrid(w,h){try{const dpr=devicePixelRatio,step=28*dpr;vc.fillStyle='rgba(153,68,255,0.07)';for(let x=step;x<w;x+=step)for(let y=step;y<h;y+=step){vc.beginPath();vc.arc(x,y,0.6*dpr,0,Math.PI*2);vc.fill();}}catch(e){}}
function drawBinBg(w,h){
  try{
    const dpr=devicePixelRatio,arcY=h-22*dpr,arcX0=w*0.12,arcX1=w*0.88,arcW=arcX1-arcX0;
    const bg=vc.createLinearGradient(arcX0,0,arcX1,0);bg.addColorStop(0,'rgba(0,255,255,0.50)');bg.addColorStop(0.48,'rgba(153,68,255,0.20)');bg.addColorStop(1,'rgba(255,0,255,0.50)');
    vc.fillStyle=bg;vc.fillRect(arcX0,arcY,arcW,dpr);
    const dotR=3*dpr;
    vc.beginPath();vc.arc(arcX0,arcY,dotR,0,Math.PI*2);vc.fillStyle='rgba(0,255,255,0.70)';vc.fill();
    vc.font=`300 ${9*dpr}px 'JetBrains Mono',monospace`;vc.fillStyle='rgba(0,255,255,0.55)';vc.textAlign='left';vc.fillText('L',arcX0+8*dpr,arcY+4*dpr);
    vc.beginPath();vc.arc(arcX1,arcY,dotR,0,Math.PI*2);vc.fillStyle='rgba(255,0,255,0.70)';vc.fill();
    vc.fillStyle='rgba(255,0,255,0.55)';vc.textAlign='right';vc.fillText('R',arcX1-8*dpr,arcY+4*dpr);
    const pn=sprayActive?sprayX:0.5,px=arcX0+pn*arcW,pc=panColor(pn);
    const pg=vc.createRadialGradient(px,arcY,0,px,arcY,16*dpr);pg.addColorStop(0,`rgba(${pc.r},${pc.g},${pc.b},${sprayActive?0.35:0.12})`);pg.addColorStop(1,'rgba(0,0,0,0)');
    vc.fillStyle=pg;vc.beginPath();vc.arc(px,arcY,16*dpr,0,Math.PI*2);vc.fill();
    vc.beginPath();vc.arc(px,arcY,dotR*1.4,0,Math.PI*2);vc.fillStyle=`rgba(${pc.r},${pc.g},${pc.b},${sprayActive?0.95:0.45})`;vc.fill();
    if(sprayActive){const pv=Math.round((sprayX*2-1)*100),ps=pv===0?'C':(pv>0?'R'+Math.abs(pv):'L'+Math.abs(pv));vc.font=`300 ${8*dpr}px 'JetBrains Mono',monospace`;vc.fillStyle=`rgba(${pc.r},${pc.g},${pc.b},0.8)`;vc.textAlign='center';vc.fillText(ps,Math.max(arcX0+16*dpr,Math.min(arcX1-16*dpr,px)),arcY-10*dpr);}
    vc.textAlign='left';
  }catch(e){}
}
let orbX=-1,orbY=-1,orbPhase=0;
function drawCentralOrb(w,h,energy){
  try{
    const dpr=devicePixelRatio,t=AC?AC.currentTime:0;
    if(orbX<0){orbX=w/2;orbY=h/2;}orbPhase+=0.012+energy*0.008;
    let tx,ty;const m=P.orbMode;
    if(m===0){tx=sprayActive?sprayX*w:w/2;ty=sprayActive?sprayY*h:h/2;}
    else if(m===1){orbPhase+=0.018+energy*0.04-0.012;tx=w/2+Math.sin(orbPhase*1.4)*w*0.38;ty=h/2+Math.sin(orbPhase*0.7)*h*0.08;}
    else if(m===2){tx=w/2;ty=h/2;}
    else if(m===3){tx=w/2+Math.sin(orbPhase*0.8)*w*0.42;ty=h/2;}
    else{const sr=Math.min(w,h)*0.22*(0.5+energy*0.5);tx=w/2+Math.cos(orbPhase*0.9)*sr;ty=h/2+Math.sin(orbPhase*0.9)*sr*0.55;}
    orbX+=(tx-orbX)*(m===0?0.08:0.06);orbY+=(ty-orbY)*(m===0?0.08:0.06);
    const cx=orbX,cy=orbY,nx=cx/w,cr=Math.round(255*nx),cg=Math.round(255*(1-nx)),cb=255;
    const pulse=0.5+0.5*Math.sin(t*1.1),baseR=Math.max(4,(14+energy*18+pulse*3)*dpr),td=Math.max(4,(28+energy*22+P.binauralDisp*35)*dpr);
    const tgl=vc.createRadialGradient(cx-td*0.5,cy,0,cx-td*1.1,cy,td*1.6);tgl.addColorStop(0,`rgba(0,255,255,${0.22+energy*0.22})`);tgl.addColorStop(0.55,`rgba(0,80,255,${0.06+energy*0.07})`);tgl.addColorStop(1,'rgba(0,0,0,0)');vc.beginPath();vc.arc(cx-td*0.5,cy,td*1.6,0,Math.PI*2);vc.fillStyle=tgl;vc.fill();
    const tgr=vc.createRadialGradient(cx+td*0.5,cy,0,cx+td*1.1,cy,td*1.6);tgr.addColorStop(0,`rgba(255,0,255,${0.22+energy*0.22})`);tgr.addColorStop(0.55,`rgba(153,0,255,${0.06+energy*0.07})`);tgr.addColorStop(1,'rgba(0,0,0,0)');vc.beginPath();vc.arc(cx+td*0.5,cy,td*1.6,0,Math.PI*2);vc.fillStyle=tgr;vc.fill();
    const outerR=baseR*2.4,segs=32,gap=0.18;
    for(let i=0;i<segs;i++){const a0=(i/segs)*Math.PI*2,a1=((i+1)/segs-gap)*Math.PI*2,t_=i/segs,rc=Math.round(t_*255),gc=Math.round((1-Math.abs(t_*2-1))*153),bc=Math.round((1-t_)*255);vc.beginPath();vc.arc(cx,cy,outerR,a0,a1);vc.strokeStyle=`rgba(${rc},${gc},${bc},${0.25+energy*0.35})`;vc.lineWidth=(0.8+energy*0.7)*dpr;vc.stroke();}
    vc.beginPath();vc.arc(cx,cy,baseR*1.1,0,Math.PI*2);vc.strokeStyle=`rgba(${cr},${cg},${cb},${0.55+energy*0.35})`;vc.lineWidth=(0.7+energy*0.6)*dpr;vc.stroke();
    const core=vc.createRadialGradient(cx,cy,0,cx,cy,baseR);core.addColorStop(0,`rgba(255,255,255,${0.90+energy*0.10})`);core.addColorStop(0.20,`rgba(${cr},${cg},${cb},${0.78+energy*0.18})`);core.addColorStop(0.65,`rgba(${cr},${cg},${cb},${0.10+energy*0.12})`);core.addColorStop(1,'rgba(0,0,0,0)');vc.beginPath();vc.arc(cx,cy,baseR,0,Math.PI*2);vc.fillStyle=core;vc.fill();
    [[0.38,'0,255,255'],[0.60,'255,0,255'],[0.80,'153,68,255']].forEach(([rf,rgb],i)=>{const ps=0.5+0.5*Math.sin(t*0.16+i*1.8),sr=Math.min(w,h)*rf*(0.97+ps*0.03),sa=0.04+ps*0.05+energy*0.07;vc.beginPath();vc.arc(cx,cy,sr,0,Math.PI*2);vc.setLineDash([5*dpr,16*dpr]);vc.strokeStyle=`rgba(${rgb},${sa})`;vc.lineWidth=0.6*dpr;vc.stroke();vc.setLineDash([]);});
  }catch(e){}
}
function drawIdleOrb(w,h){
  try{const dpr=devicePixelRatio,t=performance.now()/1000,pulse=0.5+0.5*Math.sin(t*0.7);if(orbX<0){orbX=w/2;orbY=h/2;}orbX+=(w/2-orbX)*0.04;orbY+=(h/2-orbY)*0.04;const cx=orbX,cy=orbY,baseR=Math.max(3,(6+pulse*2)*dpr);[[0.22,'0,255,255'],[0.38,'153,68,255'],[0.52,'255,0,255']].forEach(([rf,rgb],i)=>{const ps=0.5+0.5*Math.sin(t*0.14+i*2.1),sr=Math.min(w,h)*rf*(0.97+ps*0.03);vc.beginPath();vc.arc(cx,cy,sr,0,Math.PI*2);vc.setLineDash([6*dpr,18*dpr]);vc.strokeStyle=`rgba(${rgb},${0.06+ps*0.05})`;vc.lineWidth=0.5*dpr;vc.stroke();vc.setLineDash([]);});const core=vc.createRadialGradient(cx,cy,0,cx,cy,baseR);core.addColorStop(0,`rgba(255,255,255,${0.35+pulse*0.20})`);core.addColorStop(0.35,`rgba(153,68,255,${0.15+pulse*0.10})`);core.addColorStop(1,'rgba(0,0,0,0)');vc.beginPath();vc.arc(cx,cy,baseR,0,Math.PI*2);vc.fillStyle=core;vc.fill();}catch(e){}
}
function drawRipples(w,h,energy){try{for(let i=ripples.length-1;i>=0;i--){const rp=ripples[i];rp.r+=(2+energy*4)*devicePixelRatio;rp.life-=rp.decay;if(rp.life<=0||rp.r>rp.maxR){ripples.splice(i,1);continue;}vc.beginPath();vc.arc(rp.x,rp.y,rp.r,0,Math.PI*2);vc.setLineDash([4*devicePixelRatio,12*devicePixelRatio]);vc.strokeStyle=`rgba(${rp.r2},${rp.g2},${rp.b2},${rp.life*0.4})`;vc.lineWidth=0.7*devicePixelRatio;vc.stroke();vc.setLineDash([]);}}catch(e){}}
function drawParts(w,h){try{for(let i=pts.length-1;i>=0;i--){const p=pts[i];p.px=p.x;p.py=p.y;p.x+=p.vx;p.y+=p.vy;p.vy+=0.028*devicePixelRatio;p.vx*=0.991;p.life-=p.decay;if(p.life<=0){pts.splice(i,1);continue;}const a=p.life,dx=p.x-p.px,dy=p.y-p.py,len=Math.sqrt(dx*dx+dy*dy);if(len>0.5){const sg=vc.createLinearGradient(p.px,p.py,p.x,p.y);sg.addColorStop(0,`rgba(${p.r},${p.g},${p.b},0)`);sg.addColorStop(1,`rgba(${p.r},${p.g},${p.b},${a*0.45})`);vc.beginPath();vc.moveTo(p.px,p.py);vc.lineTo(p.x,p.y);vc.strokeStyle=sg;vc.lineWidth=p.sz*0.5;vc.lineCap='round';vc.stroke();}vc.beginPath();vc.arc(p.x,p.y,p.sz*0.38,0,Math.PI*2);vc.fillStyle=`rgba(${p.r},${p.g},${p.b},${a*0.85})`;vc.fill();if(a>0.65){vc.beginPath();vc.arc(p.x,p.y,p.sz*0.12,0,Math.PI*2);vc.fillStyle=`rgba(255,255,255,${(a-0.65)*2.0})`;vc.fill();}}}catch(e){}}
function drawHUD(w,h){try{const dpr=devicePixelRatio;vc.font=`300 italic ${7*dpr}px 'JetBrains Mono',monospace`;vc.textAlign='right';['VOL·'+Math.round(P.masterVol*100),'D/W·'+Math.round(P.dryWet*100),'CUT·'+Math.round(P.hiCut*100),'CHOP·'+Math.round(P.chopDensity*100),'DISP·'+Math.round(P.binauralDisp*100),'GLCH·'+Math.round(P.glitchProb*100),'FB·'+Math.round(P.feedback*100),'VEL·'+Math.round(P.particleVel*100),'PT·'+Math.round((P.pitch*2-1)*24)+'st'].forEach((l,i)=>{vc.fillStyle='rgba(153,68,255,0.30)';vc.fillText(l,w-8*dpr,12*dpr+i*10*dpr);});vc.textAlign='left';}catch(e){}}

render();

// ── TOUCH ──
function getNorm(e){const r=viz.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{nx:(t.clientX-r.left)/r.width,ny:(t.clientY-r.top)/r.height};}
async function canvasStart(nx,ny){
  if(!AC)initAC(); if(AC.state==='suspended')await AC.resume();
  if(!audioBuf){setInfo('Load audio · or use Mic');return;}
  if(!running)go();
  sprayX=nx;sprayY=ny;sprayActive=true;sprayForce=1;setDryPan(nx);
  document.getElementById('hint').classList.add('gone');
}
viz.addEventListener('touchstart',async e=>{e.preventDefault();const{nx,ny}=getNorm(e);canvasStart(nx,ny);},{passive:false});
viz.addEventListener('touchmove',e=>{e.preventDefault();const{nx,ny}=getNorm(e);sprayX=nx;sprayY=ny;sprayForce=1;setDryPan(nx);},{passive:false});
viz.addEventListener('touchend',()=>{sprayActive=false;}); viz.addEventListener('touchcancel',()=>{sprayActive=false;});
viz.addEventListener('mousedown',async e=>{const{nx,ny}=getNorm(e);canvasStart(nx,ny);});
viz.addEventListener('mousemove',e=>{if(!sprayActive)return;const{nx,ny}=getNorm(e);sprayX=nx;sprayY=ny;sprayForce=1;setDryPan(nx);});
viz.addEventListener('mouseup',()=>{sprayActive=false;}); viz.addEventListener('mouseleave',()=>{sprayActive=false;});
document.getElementById('cw').addEventListener('dragover',e=>e.preventDefault());
document.getElementById('cw').addEventListener('drop',async e=>{e.preventDefault();const f=e.dataTransfer.files[0];if(f)await loadFile(f);});

// ── KNOBS ──
function drawKnob(cv,val,sz){
  const kc=cv.getContext('2d'),cx=sz/2,cy=sz/2,r=sz*0.36,sa=Math.PI*0.75,ea=Math.PI*2.25,va=sa+val*(ea-sa);
  kc.clearRect(0,0,sz,sz);
  kc.beginPath();kc.arc(cx,cy,r,sa,ea);kc.strokeStyle='rgba(255,255,255,0.07)';kc.lineWidth=sz*0.09;kc.lineCap='round';kc.stroke();
  if(val>0.001){const g=kc.createLinearGradient(0,0,sz,0);g.addColorStop(0,'#00ffff');g.addColorStop(0.5,'#9944ff');g.addColorStop(1,'#ff00ff');kc.beginPath();kc.arc(cx,cy,r,sa,va);kc.strokeStyle=g;kc.lineWidth=sz*0.09;kc.lineCap='round';kc.stroke();kc.beginPath();kc.arc(cx,cy,r,sa,va);kc.strokeStyle=g;kc.lineWidth=sz*0.20;kc.lineCap='round';kc.globalAlpha=0.12;kc.stroke();kc.globalAlpha=1;}
  kc.beginPath();kc.arc(cx,cy,r*0.30,0,Math.PI*2);const grd=kc.createRadialGradient(cx,cy,0,cx,cy,r*0.30);grd.addColorStop(0,'rgba(40,30,60,0.95)');grd.addColorStop(1,'rgba(20,15,35,0.98)');kc.fillStyle=grd;kc.fill();kc.strokeStyle='rgba(153,68,255,0.15)';kc.lineWidth=0.7;kc.stroke();
  const dx=cx+Math.cos(va)*r*0.62,dy=cy+Math.sin(va)*r*0.62;kc.beginPath();kc.arc(dx,dy,sz*0.042,0,Math.PI*2);kc.fillStyle='rgba(255,255,255,0.90)';kc.fill();if(val>0.001){kc.beginPath();kc.arc(dx,dy,sz*0.065,0,Math.PI*2);kc.fillStyle='rgba(255,255,255,0.12)';kc.fill();}
}
function refreshKnobs(){document.querySelectorAll('.kw').forEach(w=>{const cv=w.querySelector('canvas'),sz=parseInt(cv.getAttribute('width'));drawKnob(cv,P[w.dataset.p],sz);const p=w.dataset.p;if(p==='pitch'){const st=Math.round((P.pitch*2-1)*24);w.querySelector('.kval').textContent=(st>0?'+':'')+st+'st';}else{w.querySelector('.kval').textContent=Math.round(P[p]*100)+'%';}});}
refreshKnobs();

let akK=null,akP=null,kSY=0,kSV=0;
document.querySelectorAll('.kw').forEach(w=>{const on=cy=>{akK=w;akP=w.dataset.p;kSY=cy;kSV=P[akP];};w.addEventListener('mousedown',e=>{on(e.clientY);e.preventDefault();});w.addEventListener('touchstart',e=>{on(e.touches[0].clientY);e.preventDefault();},{passive:false});});
const onKMove=cy=>{if(!akK||!akP)return;let v=Math.max(0,Math.min(1,kSV+(kSY-cy)/180));P[akP]=v;applyParam(akP,v);const cv=akK.querySelector('canvas');drawKnob(cv,v,parseInt(cv.getAttribute('width')));const p=akP;if(p==='pitch'){const st=Math.round((v*2-1)*24);akK.querySelector('.kval').textContent=(st>0?'+':'')+st+'st';}else{akK.querySelector('.kval').textContent=Math.round(v*100)+'%';}};
window.addEventListener('mousemove',e=>onKMove(e.clientY));window.addEventListener('touchmove',e=>{if(akK)onKMove(e.touches[0].clientY);},{passive:true});window.addEventListener('mouseup',()=>{akK=null;akP=null;});window.addEventListener('touchend',()=>{akK=null;akP=null;});

// ── BUTTONS ──
document.getElementById('init-btn').addEventListener('click',async()=>{if(!AC)initAC();if(AC.state==='suspended')await AC.resume();toggleInit();});
document.getElementById('mic-btn').addEventListener('click',async()=>{
  if(!AC)initAC();
  try{if(AC.state==='suspended')await AC.resume();}catch(e){}
  micRecording?stopMic():startMic();
});
document.getElementById('load-btn').addEventListener('click',async()=>{
  if(!AC)initAC();
  try{if(AC.state==='suspended')await AC.resume();}catch(e){}
  document.getElementById('file-in').click();
});
document.getElementById('rec-btn').addEventListener('click',()=>toggleRec());
document.getElementById('file-in').addEventListener('change',async e=>{const f=e.target.files[0];if(f)await loadFile(f);e.target.value='';});
function updateOrbUI(){document.querySelectorAll('.obtn').forEach(b=>{b.classList.toggle('active',parseInt(b.dataset.mode)===P.orbMode);});}
document.querySelectorAll('.obtn').forEach(b=>{
  b.addEventListener('click',()=>{P.orbMode=parseInt(b.dataset.mode);orbPhase=0;updateOrbUI();});
  b.addEventListener('touchend',e=>{e.preventDefault();P.orbMode=parseInt(b.dataset.mode);orbPhase=0;updateOrbUI();});
});

// ── INIT ──
openDB().catch(e=>console.warn('IndexedDB unavailable',e));
</script>
