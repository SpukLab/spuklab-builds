<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>SpxX A/V — spuklab</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--cy:#00ffff;--mg:#ff00ff;--vio:#9944ff;--bg1:#13111f;--bg2:#1b1726;--b1:rgba(153,68,255,.18);--b2:rgba(153,68,255,.07)}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg1);color:#fff;font-family:'Inter',sans-serif}
#app{position:relative;width:100%;height:100%}
canvas{position:absolute;inset:0;width:100%;height:100%}
.panel{position:absolute;top:0;bottom:48px;width:238px;background:rgba(19,17,31,.94);backdrop-filter:blur(20px);border:1px solid var(--b1);z-index:10;display:flex;flex-direction:column;overflow:hidden;transition:transform .3s ease,bottom .3s ease}
#pl{left:0;border-left:none;border-radius:0 9px 9px 0}
#pr{right:0;border-right:none;border-radius:9px 0 0 9px}
#pl.col{transform:translateX(-238px)}
#pr.col{transform:translateX(238px)}
.ph{padding:9px 12px 7px;border-bottom:1px solid var(--b1);font-family:'JetBrains Mono',monospace;font-style:italic;font-size:9px;color:rgba(255,255,255,.4);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ph b{font-size:11px;font-weight:700;color:rgba(255,255,255,.88)}
.ps{flex:1;overflow-y:auto;padding:8px}
.ps::-webkit-scrollbar{width:3px}
.ps::-webkit-scrollbar-thumb{background:var(--b1);border-radius:2px}
.tabs{display:flex;border-bottom:1px solid var(--b1);flex-shrink:0}
.tab{flex:1;padding:6px 0;font-family:'JetBrains Mono',monospace;font-style:italic;font-size:7px;color:rgba(255,255,255,.3);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent}
.tab.on{color:var(--cy);border-bottom-color:var(--cy)}
.pane{display:none;flex:1;overflow-y:auto;padding:8px;flex-direction:column;gap:5px}
.pane.on{display:flex}
.ns{margin-bottom:7px;padding:7px 8px;border:1px solid var(--b1);border-radius:6px;background:rgba(153,68,255,.03)}
.ns.act{background:rgba(153,68,255,.06)}
.nh{display:flex;align-items:center;gap:4px;margin-bottom:4px}
.nnum{font-family:'JetBrains Mono',monospace;font-style:italic;font-weight:800;font-size:10px;width:14px;text-align:center}
.nname{font-size:8px;color:rgba(255,255,255,.42);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ntog{width:22px;height:13px;border-radius:7px;border:1px solid var(--b1);background:transparent;cursor:pointer;flex-shrink:0}
.ntog.on{background:currentColor}
.nload{width:100%;padding:3px 5px;font-size:7px;font-family:'JetBrains Mono',monospace;font-style:italic;background:var(--b2);border:1px solid var(--b1);color:rgba(255,255,255,.42);border-radius:3px;cursor:pointer;margin-bottom:4px;text-align:center}
.cr{display:flex;align-items:center;gap:4px;margin-bottom:3px}
.cl{font-family:'JetBrains Mono',monospace;font-style:italic;font-size:7px;color:rgba(255,255,255,.3);width:28px;flex-shrink:0}
input[type=range]{flex:1;-webkit-appearance:none;height:2px;background:rgba(255,255,255,.1);border-radius:1px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:9px;height:9px;border-radius:50%;background:#fff;cursor:pointer}
.cv{font-family:'JetBrains Mono',monospace;font-size:7px;color:rgba(255,255,255,.3);width:24px;text-align:right}
.lfo-row{display:flex;gap:3px;margin-top:3px;align-items:center}
.lfo-lbl{font-family:'JetBrains Mono',monospace;font-style:italic;font-size:7px;color:rgba(153,68,255,.8);width:22px}
select.mini{flex:1;background:rgba(0,0,0,.4);border:1px solid var(--b1);color:rgba(255,255,255,.6);font-family:'JetBrains Mono',monospace;font-style:italic;font-size:7px;border-radius:3px;padding:1px 3px;outline:none}
.tog{padding:2px 5px;font-family:'JetBrains Mono',monospace;font-style:italic;font-size:7px;background:transparent;border:1px solid var(--b1);color:rgba(255,255,255,.28);border-radius:3px;cursor:pointer}
.tog.on{background:rgba(153,68,255,.2);border-color:var(--vio);color:#b580ff}
.hrtf-row{display:flex;gap:3px;margin-top:3px}
.msect{padding:7px 8px;border-top:1px solid var(--b1);flex-shrink:0}
.mlbl{font-family:'JetBrains Mono',monospace;font-style:italic;font-size:7px;color:rgba(255,255,255,.3);margin-bottom:4px}
.gbtn{padding:3px 8px;font-family:'JetBrains Mono',monospace;font-style:italic;font-size:7px;background:var(--b2);border:1px solid var(--b1);color:rgba(255,255,255,.42);border-radius:3px;cursor:pointer}
.tb-card{padding:8px 9px;background:rgba(153,68,255,.04);border:1px solid var(--b1);border-radius:6px}
.tb-head{display:flex;align-items:center;gap:4px;margin-bottom:4px}
.tb-lbl{font-family:'JetBrains Mono',monospace;font-style:italic;font-size:7px;color:rgba(255,255,255,.32);flex:1}
.edel{width:16px;height:16px;border:none;background:transparent;color:rgba(255,255,255,.2);font-size:12px;cursor:pointer;flex-shrink:0;line-height:1;display:flex;align-items:center;justify-content:center}
.edel:hover{color:var(--mg)}
textarea.tbt{width:100%;min-height:38px;background:rgba(0,0,0,.22);border:1px solid var(--b1);border-radius:3px;color:rgba(255,255,255,.82);font-family:'JetBrains Mono',monospace;font-style:italic;font-size:8px;padding:4px 6px;resize:none;outline:none;margin-bottom:4px}
.tb-ab{padding:2px 7px;font-family:'JetBrains Mono',monospace;font-style:italic;font-size:7px;background:rgba(0,255,255,.05);border:1px solid rgba(0,255,255,.15);color:rgba(0,255,255,.6);border-radius:3px;cursor:pointer;flex-shrink:0}
.tb-an{font-family:'JetBrains Mono',monospace;font-style:italic;font-size:7px;color:rgba(255,255,255,.38);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.din{width:32px;background:rgba(0,0,0,.3);border:1px solid var(--b1);color:rgba(0,255,255,.7);font-family:'JetBrains Mono',monospace;font-style:italic;font-size:7px;border-radius:3px;padding:2px 4px;outline:none;text-align:right}
.pill{padding:2px 6px;font-family:'JetBrains Mono',monospace;font-style:italic;font-size:7px;border-radius:10px;border:1px solid var(--b1);background:transparent;color:rgba(255,255,255,.25);cursor:pointer;white-space:nowrap}
.pill.on{border-color:var(--cy);background:rgba(0,255,255,.1);color:var(--cy)}
.sc-card{padding:8px 9px;background:rgba(153,68,255,.04);border:1px solid var(--b1);border-radius:6px;margin-bottom:7px}
.sc-card.asc{border-color:rgba(0,255,255,.35);background:rgba(0,255,255,.03)}
.sc-head{display:flex;align-items:center;gap:5px;margin-bottom:5px}
.sc-ni{background:transparent;border:none;color:rgba(255,255,255,.78);font-family:'JetBrains Mono',monospace;font-style:italic;font-size:9px;font-weight:700;flex:1;outline:none;min-width:0}
.sc-pills{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:5px;min-height:14px}
.sc-np{width:14px;height:14px;border-radius:50%;font-family:'JetBrains Mono',monospace;font-size:6px;display:flex;align-items:center;justify-content:center;font-weight:700;opacity:.22}
.sc-np.on{opacity:1}
.sc-tags{display:flex;flex-direction:column;gap:2px;margin-bottom:5px}
.sc-tag{font-family:'JetBrains Mono',monospace;font-style:italic;font-size:7px;color:rgba(255,255,255,.35);padding:2px 5px;background:rgba(153,68,255,.07);border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sc-tag.sys{color:rgba(0,255,255,.6)}
.sc-btns{display:flex;gap:4px;margin-bottom:5px}
.sbtn{flex:1;padding:4px;font-family:'JetBrains Mono',monospace;font-style:italic;font-size:7px;border:1px solid var(--b1);background:var(--b2);color:rgba(255,255,255,.45);border-radius:3px;cursor:pointer;text-align:center}
.sbtn.go{border-color:rgba(0,255,255,.28);color:var(--cy)}
.sbtn.flash{background:rgba(153,68,255,.28);color:#fff}
.sc-row{display:flex;align-items:center;gap:4px;padding-top:4px;border-top:1px solid var(--b1);margin-top:4px}
.sc-in{width:32px;background:rgba(0,0,0,.3);border:1px solid var(--b1);color:rgba(255,255,255,.5);font-family:'JetBrains Mono',monospace;font-style:italic;font-size:7px;border-radius:3px;padding:2px 4px;outline:none;text-align:right}
.fx-lbl{font-family:'JetBrains Mono',monospace;font-style:italic;font-size:7px;color:rgba(153,68,255,.8);margin-bottom:5px;letter-spacing:.06em}
.fx-btns{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.fx-btn{padding:5px 6px;font-family:'JetBrains Mono',monospace;font-style:italic;font-size:7px;border:1px solid var(--b1);background:var(--b2);color:rgba(255,255,255,.6);border-radius:4px;cursor:pointer;flex:1;text-align:center}
.fx-btn:active{background:rgba(153,68,255,.3);color:#fff}
.fxd{height:1px;background:var(--b1);margin:6px 0}
.seq-step{display:flex;gap:3px;align-items:center;margin-bottom:4px;padding:4px 6px;background:rgba(153,68,255,.04);border:1px solid var(--b1);border-radius:4px}
.seq-step.aqs{border-color:rgba(0,255,255,.4);background:rgba(0,255,255,.06)}
#setlist-bar{position:absolute;bottom:48px;left:0;right:0;background:rgba(13,11,25,.96);backdrop-filter:blur(16px);border-top:1px solid var(--b1);z-index:15;display:none;flex-direction:column}
#sl-strip{height:36px;display:flex;align-items:center;padding:0 8px;gap:4px;overflow-x:auto;border-bottom:1px solid var(--b1)}
#sl-detail{max-height:180px;overflow-y:auto;padding:6px 10px}
.sl-row{display:flex;align-items:center;gap:4px;margin-bottom:5px;padding:4px 6px;border-radius:4px;border:1px solid var(--b1)}
.sl-row.sla{border-color:var(--cy)}
#transport{position:absolute;bottom:0;left:0;right:0;height:48px;background:rgba(19,17,31,.96);backdrop-filter:blur(20px);border-top:1px solid var(--b1);z-index:20;display:flex;align-items:center;padding:0 7px;gap:5px}
.tb2{width:28px;height:28px;border-radius:4px;border:1px solid var(--b1);background:var(--b2);color:rgba(255,255,255,.85);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tb2.layer-on{background:rgba(153,68,255,.2);border-color:var(--vio)}
.tb2.reca{background:rgba(255,0,0,.12);border-color:rgba(255,0,0,.45);color:#ff5555}
#tlbar{flex:1;height:4px;background:rgba(255,255,255,.09);border-radius:2px;position:relative;cursor:pointer}
#tlprog{height:100%;background:linear-gradient(90deg,var(--cy),var(--vio));border-radius:2px;width:0%}
#tlhead{width:9px;height:9px;border-radius:50%;background:#fff;position:absolute;top:50%;transform:translate(-50%,-50%);left:0%;pointer-events:none}
#ttime{font-family:'JetBrains Mono',monospace;font-style:italic;font-size:9px;color:rgba(255,255,255,.45);min-width:42px;text-align:center}
#tmode{font-family:'JetBrains Mono',monospace;font-style:italic;font-size:7px;color:var(--vio);letter-spacing:.08em}
.tsep{width:1px;height:20px;background:var(--b1);flex-shrink:0}
.logo-t{font-family:'JetBrains Mono',monospace;font-style:italic;font-size:10px;letter-spacing:.04em;flex-shrink:0}
.logo-t .s{font-weight:800;color:#fff}
.logo-t .l{font-weight:300;color:var(--cy)}
.logo-sub{font-family:'JetBrains Mono',monospace;font-style:italic;font-size:8px;background:linear-gradient(90deg,var(--cy),var(--vio),var(--mg));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:800;margin-left:3px}
.tadd{width:100%;padding:4px;font-family:'JetBrains Mono',monospace;font-style:italic;font-size:7px;background:var(--b2);border:1px solid var(--b1);color:rgba(255,255,255,.42);border-radius:3px;cursor:pointer;flex-shrink:0}
</style>
</head>
<body>
<div id="app">
<canvas id="cv"></canvas>
<div id="pl" class="panel">
  <div class="ph"><b>NODES</b><span style="color:var(--vio)">8×BINAURAL</span></div>
  <div class="ps" id="nodes-panel"></div>
  <div class="msect">
    <div class="mlbl">MASTER</div>
    <div class="cr"><span class="cl">VOL</span><input type="range" id="mvol" min="0" max="1" step=".01" value=".8" oninput="setMVol(this.value);document.getElementById('mvolv').textContent=parseFloat(this.value).toFixed(2)"><span class="cv" id="mvolv">.80</span></div>
    <div class="cr" style="margin-top:3px"><span class="cl">GLITCH</span><input type="range" id="gint" min="0" max="1" step=".01" value=".5" style="flex:1"><button class="gbtn" onclick="trigGlitch()">!</button></div>
    <div class="cr" style="margin-top:3px"><span class="cl" style="color:var(--cy)">DENSITY</span><input type="range" id="density-sl" min="0" max="1" step=".01" value=".5" oninput="NODE_DENSITY=parseFloat(this.value);this.nextElementSibling.textContent=parseFloat(this.value).toFixed(2)"><span class="cv">.50</span></div>
  </div>
</div>
<div id="pr" class="panel">
  <div class="ph"><b>COMPOSE</b></div>
  <div class="tabs">
    <button class="tab on" onclick="swTab('text',this)">TEXT</button>
    <button class="tab" onclick="swTab('scenes',this)">SCENES</button>
    <button class="tab" onclick="swTab('fx',this)">FX</button>
    <button class="tab" onclick="swTab('bg',this)">BG</button>
    <button class="tab" onclick="swTab('out',this)">OUT</button>
  </div>
  <div class="pane on" id="pane-text"><div id="tb-list"></div><button class="tadd" onclick="addTB()">+ NEW TEXT BLOCK</button></div>
  <div class="pane" id="pane-scenes"><div id="sc-list"></div><button class="tadd" onclick="addScene()">+ NEW SCENE</button></div>
  <div class="pane" id="pane-fx">
    <div class="fx-lbl">INSTANT TRIGGERS</div>
    <div class="fx-btns">
      <button class="fx-btn" onclick="fxTrig('explosion')">EXPLODE</button>
      <button class="fx-btn" onclick="fxTrig('colorshift')">COLOR</button>
      <button class="fx-btn" onclick="fxTrig('strobe')">STROBE</button>
      <button class="fx-btn" onclick="fxTrig('invert')">INVERT</button>
      <button class="fx-btn" onclick="fxTrig('shatter')">SHATTER</button>
      <button class="fx-btn" onclick="fxTrig('vortex')">VORTEX</button>
      <button class="fx-btn" onclick="fxTrig('glitch')">GLITCH</button>
    </div>
    <div class="fxd"></div>
    <div class="fx-lbl">CONTINUOUS + LFO</div>
    <div id="fx-cont"></div>
    <div class="fxd"></div>
    <div class="fx-lbl">AUTO TRIGGER</div>
    <div class="cr"><span class="cl">THRESH</span><input type="range" id="fx-thresh" min="0" max="1" step=".01" value=".8" oninput="FX.autoThresh=parseFloat(this.value);this.nextElementSibling.textContent=parseFloat(this.value).toFixed(2)"><span class="cv">.80</span></div>
    <div class="cr"><span class="cl">FX</span><select class="mini" id="fx-auto"><option value="off">OFF</option><option value="explosion">EXPLODE</option><option value="colorshift">COLOR</option><option value="glitch">GLITCH</option><option value="strobe">STROBE</option></select></div>
    <div class="fxd"></div>
    <div class="fx-lbl">SEQUENCER</div>
    <div class="cr"><span class="cl">BPM</span><input type="range" min="30" max="240" step="1" value="120" id="seq-bpm" oninput="SEQ.bpm=parseInt(this.value);document.getElementById('seq-bpmv').textContent=this.value"><span class="cv" id="seq-bpmv">120</span></div>
    <div class="cr" style="margin-bottom:5px"><span class="cl">DIV</span><select class="mini" id="seq-div" onchange="SEQ.div=parseFloat(this.value)"><option value="4">1bar</option><option value="2">1/2</option><option value="1" selected>1/4</option><option value=".5">1/8</option><option value=".25">1/16</option></select><button class="tog on" id="seq-run" onclick="togSeq()" style="margin-left:4px">RUN</button></div>
    <div id="seq-steps"></div>
    <button class="tadd" onclick="addSeqStep()">+ ADD STEP</button>
  </div>
  <div class="pane" id="pane-bg"><div id="bg-panel"></div></div>
  <div class="pane" id="pane-out" style="gap:5px">
    <div style="font-family:'JetBrains Mono',monospace;font-style:italic;font-size:7px;color:rgba(255,255,255,.32)">CLIP RENDER</div>
    <button class="sbtn" id="fmt169" onclick="setFmt('16:9')" style="padding:6px">16:9 — 1920×1080</button>
    <button class="sbtn" id="fmt916" onclick="setFmt('9:16')" style="padding:6px">9:16 — 1080×1920</button>
    <button class="tadd" style="margin-top:auto;border-color:rgba(0,255,255,.2);color:var(--cy)" onclick="startRender()">● RENDER</button>
  </div>
</div>
<div id="setlist-bar">
  <div id="sl-strip">
    <span style="font-family:'JetBrains Mono',monospace;font-style:italic;font-size:7px;color:rgba(153,68,255,.7);flex-shrink:0;margin-right:4px">SET</span>
    <div id="sl-blocks" style="display:flex;gap:3px;align-items:center;flex:1"></div>
    <button style="padding:2px 7px;font-family:'JetBrains Mono',monospace;font-style:italic;font-size:7px;background:var(--b2);border:1px solid var(--b1);color:rgba(255,255,255,.4);border-radius:3px;cursor:pointer;flex-shrink:0" onclick="addSL()">+</button>
  </div>
  <div id="sl-detail"><div id="sl-rows"></div></div>
</div>
<div id="transport">
  <div class="logo-t"><span class="s">SPUK</span><span class="l">LAB</span></div>
  <span class="logo-sub">SpxX</span>
  <div class="tsep"></div>
  <button class="tb2" id="ptl" onclick="togPanel('l')">◀</button>
  <button class="tb2" id="bplay" onclick="togPlay()">▶</button>
  <button class="tb2" id="brec" onclick="togRec()">⏺</button>
  <button class="tb2" onclick="stopAll()">■</button>
  <button class="tb2" id="ptr" onclick="togPanel('r')">▶</button>
  <div class="tsep"></div>
  <button class="tb2 layer-on" id="lay-nodes" onclick="togLayer('nodes')" title="Nodes">N</button>
  <button class="tb2 layer-on" id="lay-orb" onclick="togLayer('orb')" title="Orb">O</button>
  <button class="tb2 layer-on" id="lay-ptcl" onclick="togLayer('ptcl')" title="Particles">P</button>
  <button class="tb2" id="btn-sl" onclick="togSL()" title="Setlist">≡</button>
  <div class="tsep"></div>
  <div id="tlbar" onclick="scrub(event)"><div id="tlprog"></div><div id="tlhead"></div></div>
  <input type="number" id="dur-inp" min="10" max="7200" step="10" value="180"
    style="width:46px;background:rgba(0,0,0,.4);border:1px solid var(--b1);color:rgba(0,255,255,.7);font-family:'JetBrains Mono',monospace;font-style:italic;font-size:8px;border-radius:3px;padding:2px 4px;outline:none;text-align:right;flex-shrink:0"
    oninput="setDur(this.value)">
  <span style="font-family:'JetBrains Mono',monospace;font-style:italic;font-size:7px;color:rgba(255,255,255,.3);flex-shrink:0">s</span>
  <span id="ttime">0:00.0</span>
  <span id="tmode" style="font-family:'JetBrains Mono',monospace;font-style:italic;font-size:7px;color:var(--vio);letter-spacing:.08em">PERF</span>
</div>
<div id="fi-wrap" style="display:none"></div>
</div>

<script>
// ── UTILS ─────────────────────────────────────
function safe(v,f){
  f=(f===undefined)?0:f;
  return(typeof v==='number'&&isFinite(v)&&!isNaN(v))?v:f;
}
function lfoVal(w,p){
  if(w==='sin')return Math.sin(p);
  if(w==='tri')return Math.asin(Math.sin(p))/(Math.PI/2);
  if(w==='sqr')return Math.sign(Math.sin(p));
  return((p%(Math.PI*2))/(Math.PI*2))*2-1;
}
function hexRgba(hex){
  hex=(hex||'#00ffff').replace('#','');
  if(hex.length===3)hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  var r=parseInt(hex.slice(0,2),16)||0;
  var g=parseInt(hex.slice(2,4),16)||0;
  var b=parseInt(hex.slice(4,6),16)||0;
  return'rgba('+r+','+g+','+b+',';
}
function fmtT(s){
  var m=Math.floor(s/60);
  var sec=(s%60).toFixed(1);
  if(parseFloat(sec)<10)sec='0'+sec;
  return m+':'+sec;
}
function fmt2(k,v){
  if(k==='pitch')return(v>0?'+':'')+parseInt(v);
  return parseFloat(v).toFixed(2);
}

// ── COLORS ────────────────────────────────────
var NCOLS=['#00ffff','#ff00ff','#ffaa00','#44ff88','#ff4488','#88aaff','#ff6600','#cc44ff'];
var NCOLS_A=[];
for(var _ci=0;_ci<NCOLS.length;_ci++) NCOLS_A.push(hexRgba(NCOLS[_ci]));

// ── IMMERSIVE NODE FIELDS ─────────────────────
var NODE_DENSITY=0.5;
var NODE_FIELDS=[];
for(var _nfi=0;_nfi<8;_nfi++){
  var _pts=[];
  for(var _pi=0;_pi<120;_pi++){
    _pts.push({
      bx:Math.random(),by:Math.random(),
      z:Math.random()*2-1,
      vx:(Math.random()-.5)*.0008,
      vy:(Math.random()-.5)*.0008,

// ── AUDIO ─────────────────────────────────────
function initAC(){
  if(ST.audio.ctx)return;
  var AC=new(window.AudioContext||window.webkitAudioContext)();
  var master=AC.createGain();master.gain.value=.8;
  var lim=AC.createDynamicsCompressor();lim.threshold.value=-1;lim.knee.value=0;lim.ratio.value=20;lim.attack.value=.001;lim.release.value=.05;
  var ws=AC.createWaveShaper();var c=new Float32Array(256);for(var i=0;i<256;i++){var x=i*2/256-1;c[i]=Math.tanh(x*3)/Math.tanh(3);}ws.curve=c;
  var man=AC.createAnalyser();man.fftSize=2048;
  var rdest=AC.createMediaStreamDestination();
  master.connect(lim);lim.connect(ws);ws.connect(man);man.connect(AC.destination);ws.connect(rdest);
  ST.audio={ctx:AC,master:master,lim:lim,man:man,rdest:rdest};
  ST.nodes.forEach(function(n){
    var gain=AC.createGain();gain.gain.value=n.vol;
    var filt=AC.createBiquadFilter();filt.type='lowpass';filt.frequency.value=20000;filt.Q.value=1;
    var panner=AC.createPanner();panner.panningModel='HRTF';panner.distanceModel='inverse';
    setPP(panner,n.panX,n.panY);
    var an=AC.createAnalyser();an.fftSize=2048;
    gain.connect(filt);filt.connect(panner);panner.connect(an);an.connect(master);
    n.gain=gain;n.filter_node=filt;n.panner=panner;n.an=an;
  });
}
function setPP(p,x,y){if(p.positionX){p.positionX.value=x;p.positionY.value=y;p.positionZ.value=1;}else p.setPosition(x,y,1);}
function setPPS(p,x,y,t){if(p.positionX){p.positionX.setTargetAtTime(x,t,.05);p.positionY.setTargetAtTime(y,t,.05);}else p.setPosition(x,y,1);}
function loadSample(i){initAC();ST.audio.ctx.resume();document.getElementById('fi-'+i).click();}
function onFile(i,file){
  var r=new FileReader();
  r.onload=function(e){var buf=e.target.result.slice(0);ST.audio.ctx.decodeAudioData(buf,function(dec){var n=ST.nodes[i];n.buffer=dec;n.loaded=true;n.name=file.name.replace(/\.[^.]+$/,'');updNUI(i);},function(err){console.warn(err);});};
  r.readAsArrayBuffer(file);
}
function loadVoice(idx){initAC();ST.audio.ctx.resume();document.getElementById('vfi-'+idx).click();}
function onVoiceFile(idx,file){
  var b=ST.textBlocks[idx];if(!b)return;
  var r=new FileReader();
  r.onload=function(e){var buf=e.target.result.slice(0);ST.audio.ctx.decodeAudioData(buf,function(dec){b.voiceBuffer=dec;b.voiceName=file.name.replace(/\.[^.]+$/,'');renderTB();},function(err){console.warn(err);});};
  r.readAsArrayBuffer(file);
}
function playVoice(b){
  if(!b.voiceBuffer)return;if(b._vs){try{b._vs.stop();b._vs.disconnect();}catch(e){}}
  var src=ST.audio.ctx.createBufferSource();src.buffer=b.voiceBuffer;
  var g=ST.audio.ctx.createGain();g.gain.value=b.voiceVol||.8;src.connect(g);g.connect(ST.audio.master);src.start(0);b._vs=src;
}
function playNode(i){
  var n=ST.nodes[i];if(!n.loaded||!n.gain)return;stopNode(i);
  var src=ST.audio.ctx.createBufferSource();src.buffer=n.buffer;src.loop=n.loop;
  src.playbackRate.value=Math.pow(2,n.pitch/12);src.connect(n.gain);src.start(0);
  n.src=src;n.active=true;updNUI(i);
}
function stopNode(i){var n=ST.nodes[i];if(n.src){try{n.src.stop();n.src.disconnect();}catch(e){}}n.src=null;n.active=false;updNUI(i);}
function togNode(i){initAC();ST.audio.ctx.resume();var n=ST.nodes[i];if(n.active)stopNode(i);else playNode(i);}
function setNP(i,k,v){
  var n=ST.nodes[i];n[k]=parseFloat(v);if(!n.gain)return;
  var t=ST.audio.ctx.currentTime;
  if(k==='vol')n.gain.gain.setTargetAtTime(n.muted?0:n.vol,t,.05);
  if(k==='filter'&&n.filter_node)n.filter_node.frequency.setTargetAtTime(Math.max(80,n.filter),t,.05);
  if(k==='pitch'&&n.src)n.src.playbackRate.setTargetAtTime(Math.pow(2,n.pitch/12),t,.02);
  if((k==='panX'||k==='panY')&&n.hrtfMode==='manual')setPPS(n.panner,n.panX,n.panY,t);
}
function setMVol(v){if(ST.audio.master)ST.audio.master.gain.setTargetAtTime(parseFloat(v),ST.audio.ctx.currentTime,.05);}
function getRMS(an){
  if(!an)return 0;
  try{var d=new Float32Array(an.fftSize);an.getFloatTimeDomainData(d);var s=0;for(var i=0;i<d.length;i++){var v=d[i];if(isFinite(v))s+=v*v;}var r=Math.sqrt(s/d.length);return isFinite(r)?Math.min(r,1):0;}catch(e){return 0;}
}
function muteNode(i){
  var n=ST.nodes[i];n.muted=!n.muted;
  if(n.gain)n.gain.gain.setTargetAtTime(n.muted?0:n.vol,ST.audio.ctx.currentTime,.05);
  var btn=document.getElementById('mute-'+i);
  if(btn){btn.textContent=n.muted?'M':'m';btn.style.color=n.muted?'#ff4444':'rgba(255,255,255,.28)';btn.style.borderColor=n.muted?'#ff4444':'rgba(153,68,255,.18)';}
}
function soloNode(i){
  var n=ST.nodes[i];n._solo=!n._solo;
  if(n._solo){
    ST.nodes.forEach(function(m,j){if(j!==i){m._solo=false;if(m.gain)m.gain.gain.setTargetAtTime(0,ST.audio.ctx.currentTime,.05);}});
    if(!n.muted&&n.gain)n.gain.gain.setTargetAtTime(n.vol,ST.audio.ctx.currentTime,.05);
  } else {
    ST.nodes.forEach(function(m){if(m.gain)m.gain.gain.setTargetAtTime(m.muted?0:m.vol,ST.audio.ctx.currentTime,.1);});
  }
  ST.nodes.forEach(function(m,j){var btn=document.getElementById('solo-'+j);if(btn){btn.style.color=m._solo?'var(--cy)':'rgba(255,255,255,.28)';btn.style.borderColor=m._solo?'var(--cy)':'rgba(153,68,255,.18)';}});
}

// ── LFO ───────────────────────────────────────
function tickLFOs(dt){
  ST.nodes.forEach(function(n){
    if(n.lfo.on){n.lfo.phase+=dt*n.lfo.rate*Math.PI*2;applyLFO(n,n.lfo.target,lfoVal(n.lfo.wave,n.lfo.phase)*n.lfo.depth);}
    if(n.hrtfMode==='orbit'){n.orbitPhase+=dt*n.orbitSpd;n.panX=Math.cos(n.orbitPhase)*n.orbitR;n.panY=Math.sin(n.orbitPhase)*n.orbitR*.6;if(n.panner)setPPS(n.panner,n.panX,n.panY,ST.audio.ctx?ST.audio.ctx.currentTime:0);}
    else if(n.hrtfMode==='lissajous'){n.lfoX.phase+=dt*n.lfoX.rate*Math.PI*2;n.lfoY.phase+=dt*n.lfoY.rate*Math.PI*2;n.panX=Math.sin(n.lfoX.phase)*n.lfoX.depth;n.panY=Math.sin(n.lfoY.phase)*n.lfoY.depth;if(n.panner)setPPS(n.panner,n.panX,n.panY,ST.audio.ctx?ST.audio.ctx.currentTime:0);}
  });
}
function applyLFO(n,tgt,v){
  if(!n.gain)return;var t=ST.audio.ctx.currentTime;
  if(tgt==='panX'){n.panX=Math.max(-1,Math.min(1,v));if(n.panner)setPPS(n.panner,n.panX,n.panY,t);}
  else if(tgt==='panY'){n.panY=Math.max(-1,Math.min(1,v));if(n.panner)setPPS(n.panner,n.panX,n.panY,t);}
  else if(tgt==='vol')n.gain.gain.setTargetAtTime(Math.max(0,Math.min(1,n.vol+v*.3)),t,.02);
  else if(tgt==='pitch'&&n.src)n.src.playbackRate.setTargetAtTime(Math.pow(2,(n.pitch+v*12)/12),t,.02);
}

// ── FX TRIGGERS ───────────────────────────────
function fxTrig(type){
  if(type==='explosion'){
    FX.explosionParts=[];FX.shockwaves=[];
    var foci=3+Math.floor(Math.random()*3);
    for(var f=0;f<foci;f++){
      var fx2=W*(.12+Math.random()*.76),fy2=H*(.1+Math.random()*.8);
      var count=35+Math.floor(Math.random()*40);
      for(var k=0;k<count;k++){
        var a=Math.random()*Math.PI*2,spd=3+Math.random()*16;
        FX.explosionParts.push({x:fx2,y:fy2,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:1,decay:.012+Math.random()*.02,sz:Math.random()*5+1,col:NCOLS[Math.floor(Math.random()*8)]});
      }
      FX.shockwaves.push({x:fx2,y:fy2,r:0,maxR:Math.max(W,H)*.85,life:1,decay:.022,col:NCOLS[Math.floor(Math.random()*8)]});
    }
  }
  if(type==='colorshift')FX.colorShiftHue=(FX.colorShiftHue+137)%360;
  if(type==='strobe')FX.strobeCount=14;
  if(type==='invert')FX.invertFrames=22;
  if(type==='shatter'){
    FX.shatterParts=[];
    for(var i=0;i<50;i++){
      var pts=5+Math.floor(Math.random()*5);
      var radii=[];for(var r=0;r<pts;r++)radii.push(Math.random()*32+6);
      FX.shatterParts.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*5,vy:(Math.random()-.5)*5,rot:Math.random()*Math.PI*2,rotV:(Math.random()-.5)*.08,radii:radii,pts:pts,life:1,decay:.018+Math.random()*.012,col:NCOLS[Math.floor(Math.random()*8)]});
    }
  }
  if(type==='vortex')FX.vortexFrames=90;
  if(type==='glitch')trigGlitch();
}
function trigGlitch(){
  var intensity=parseFloat(document.getElementById('gint').value);
  FX.glitchFrames=Math.floor(10+intensity*25);
  FX.glitchSlices=[];
  var count=Math.floor(5+intensity*12);
  for(var i=0;i<count;i++){
    FX.glitchSlices.push({y:Math.random()*H,h:Math.random()*32+2,dx:(Math.random()-.5)*80*intensity,type:Math.floor(Math.random()*4)});
  }
}
function checkAutoFX(rms){
  var type=document.getElementById('fx-auto').value;if(type==='off')return;
  var now=performance.now()/1000;
  if(rms>FX.autoThresh&&now-FX._autoLast>1.5){FX._autoLast=now;fxTrig(type);}
}

var TEXT_ZONES=[
  {xf:.5,yf:.12},{xf:.5,yf:.20},{xf:.5,yf:.28},

  {xf:.22,yf:.5},{xf:.78,yf:.5}
];
var _lastZone=-1;
function pickPos(){
  var cands=[];for(var i=0;i<TEXT_ZONES.length;i++)cands.push(i);
  cands=cands.filter(function(z){return z!==_lastZone;});
  var occ=ST.visual.texts.map(function(t){return t.zone;});
  var free=cands.filter(function(z){return occ.indexOf(z)<0;});
  var pool=free.length?free:cands;
  var zi=pool[Math.floor(Math.random()*pool.length)];_lastZone=zi;
  var z=TEXT_ZONES[zi]||TEXT_ZONES[0];
  return{xf:z.xf+(Math.random()-.5)*.12,yf:z.yf+(Math.random()-.5)*.05,zone:zi};
}

// ── SCENES ────────────────────────────────────
var _activeScId=null;
function captureScene(id){
  var sc=null;for(var i=0;i<ST.scenes.length;i++)if(ST.scenes[i].id===id){sc=ST.scenes[i];break;}
  if(!sc)return;
  sc.state=ST.nodes.map(function(n){return{vol:n.vol,panX:n.panX,panY:n.panY,pitch:n.pitch,active:n.active,hrtfMode:n.hrtfMode,orbitR:n.orbitR,orbitSpd:n.orbitSpd};});
  sc.nodeCols=NCOLS.slice();renderScenes();flashBtn('sc-cap-'+id);
}
function gotoScene(id){
  var sc=null;for(var i=0;i<ST.scenes.length;i++)if(ST.scenes[i].id===id){sc=ST.scenes[i];break;}
  if(!sc||!sc.state)return;
  initAC();ST.audio.ctx.resume();
  var t=ST.audio.ctx.currentTime,ft=sc.fadeTime||2;
  sc.state.forEach(function(s,i){
    var n=ST.nodes[i];n.vol=s.vol;n.panX=s.panX;n.panY=s.panY;n.pitch=s.pitch;n.hrtfMode=s.hrtfMode||'manual';n.orbitR=s.orbitR||.7;n.orbitSpd=s.orbitSpd||.3;
    if(n.gain)n.gain.gain.linearRampToValueAtTime(n.muted?0:s.vol,t+ft);
    if(n.panner)setPPS(n.panner,s.panX,s.panY,t);
    if(s.active&&!n.active)playNode(i);else if(!s.active&&n.active)stopNode(i);
    updNUI(i);syncSliders(i,s);
  });
  if(sc.nodeCols){
    sc.nodeCols.forEach(function(c,i){NCOLS[i]=c;NCOLS_A[i]=hexRgba(c);});
    sc.nodeCols.forEach(function(c,i){var cp=document.querySelector('#ns-'+i+' input[type=color]');if(cp)cp.value=c;var nn=document.querySelector('#ns-'+i+' .nnum');if(nn)nn.style.color=c;var nt=document.getElementById('nt-'+i);if(nt)nt.style.color=c;});
  }
  if(sc.bg)BG_CURRENT=sc.bg;
  if(sc.hue!=null){SPal.tHue=sc.hue;SPal.tmX=safe(sc.morphX||1,1);SPal.tmY=safe(sc.morphY||1,1);}
  ST.textBlocks.forEach(function(b){
    if(b.sceneIds.indexOf(id)>=0&&(b.text.trim()||b.voiceBuffer)){
      setTimeout(function(){if(b.text.trim())showText(b.text,b.sys,b.dur,{size:b.size||13,weight:b.weight||300,color:b.color||'#ffffff',opacity:b.opacity||.88,anim:b.anim||'fade'});if(b.voiceBuffer)playVoice(b);},b.delay*1000);
    }
  });
  _activeScId=id;renderScenes();flashBtn('sc-go-'+id);
}

// ── VISUAL ENGINE ─────────────────────────────
var canvas=document.getElementById('cv'),ctx=canvas.getContext('2d');
var W,H,_phase=0,_prev=performance.now(),orbPulseAmt=0;
var trailCanvas=document.createElement('canvas'),trailCtx;

window.addEventListener('resize',resize);resize();
function initPtcls(){ST.visual.ptcls=[];for(var i=0;i<70;i++)ST.visual.ptcls.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,sz:Math.random()*1.1+.3,col:Math.random()>.5?'#00ffff':'#ff00ff'});}
function npos(n){return{x:safe(W/2+n.panX*(W*.38),W/2),y:safe(H/2-n.panY*(H*.33),H/2)};}
function togLayer(k){LAYERS[k]=!LAYERS[k];document.getElementById('lay-'+k).classList.toggle('layer-on',LAYERS[k]);}

// ── ORB — STAR HYBRID ─────────────────────────
function drawOrb(rms){
  if(!LAYERS.orb)return;
  var cx=W/2,cy=H/2,baseR=Math.min(W,H)*.12;
  var _rms=safe(rms,0);
  var pulse=safe(baseR*(1+_rms*1.8+orbPulseAmt*.4),baseR);
  orbPulseAmt=safe(orbPulseAmt*.9,0);
  var h1=safe(SPal.hue,200)%360,h2=(h1+120)%360,h3=(h1+240)%360;
  var mx=safe(SPal.mX,1),my=safe(SPal.mY,1);
  // star rays
  ctx.save();ctx.translate(cx,cy);ctx.scale(mx,my);
  for(var r=0;r<12;r++){
    var baseAngle=(r/12)*Math.PI*2+_phase*(.15+r*.008);
    var rayLen=safe(pulse*(1.8+Math.sin(_phase*1.1+r*.7)*.6+_rms*2.5),pulse);
    var rayW=safe(pulse*(.12+Math.sin(_phase*.7+r)*.06),pulse*.06);
    var hue=(h1+r*(360/12))%360;
    var g=ctx.createLinearGradient(0,0,Math.cos(baseAngle)*rayLen,Math.sin(baseAngle)*rayLen);
    g.addColorStop(0,'hsla('+hue+',100%,80%,'+safe(.6+_rms*.4,.5)+')');
    g.addColorStop(.4,'hsla('+hue+',100%,65%,'+safe(.2+_rms*.2,.15)+')');
    g.addColorStop(1,'transparent');
    ctx.beginPath();
    ctx.moveTo(Math.cos(baseAngle-rayW)*pulse*.15,Math.sin(baseAngle-rayW)*pulse*.15);
    ctx.quadraticCurveTo(Math.cos(baseAngle)*rayLen*.5,Math.sin(baseAngle)*rayLen*.5,Math.cos(baseAngle)*rayLen,Math.sin(baseAngle)*rayLen);
    ctx.lineTo(Math.cos(baseAngle+rayW)*pulse*.15,Math.sin(baseAngle+rayW)*pulse*.15);
    ctx.fillStyle=g;ctx.fill();
  }
  ctx.restore();
  // irregular expansion waves
  if(ST.audio.man){try{
    var td=new Float32Array(ST.audio.man.fftSize);ST.audio.man.getFloatTimeDomainData(td);
    var step=Math.ceil(td.length/80);
    for(var ring=0;ring<3;ring++){
      var ringR=pulse*(1.1+ring*.35);
      ctx.save();ctx.translate(cx,cy);ctx.scale(mx,my);ctx.beginPath();
      var started=false;
      for(var i=0;i<80;i++){
        var angle=(i/80)*Math.PI*2-Math.PI/2;
        var v=safe(td[i*step]||0,0);
        var r2=safe(ringR*(1+(v*(1.5+ring*.5)+Math.sin(_phase*(ring+1)*.3+i*.08)*.12)*.35),ringR);
        var px=safe(Math.cos(angle)*r2,0),py=safe(Math.sin(angle)*r2,0);
        if(!started){ctx.moveTo(px,py);started=true;}else ctx.lineTo(px,py);
      }
      ctx.closePath();
      ctx.strokeStyle='hsla('+((h1+ring*40)%360)+',100%,70%,'+safe((.35-ring*.08)*(1+_rms),.1)+')';
      ctx.lineWidth=safe(1.8-ring*.4,.4);ctx.stroke();ctx.restore();
    }
  }catch(e){}}
  // orbiting FFT arcs
  if(ST.audio.man){try{
    var fd=new Uint8Array(ST.audio.man.frequencyBinCount);ST.audio.man.getByteFrequencyData(fd);
    var rot1=_phase*.22;
    ctx.save();ctx.translate(cx,cy);ctx.scale(mx,my);
    for(var i=0;i<48;i++){
      var angle=(i/48)*Math.PI*2-Math.PI/2+rot1;
      var v=safe((fd[Math.floor(i*fd.length/96)]||0)/255,0);
      var arcW=Math.PI*2/48*.65;var r0=safe(pulse*1.05,pulse);var r1=safe(r0+v*pulse*.6,r0+1);
      ctx.beginPath();ctx.arc(0,0,safe((r0+r1)/2,r0),angle-arcW/2,angle+arcW/2);
      ctx.strokeStyle='hsla('+((h1+i*6+rot1*25)%360)+',100%,65%,'+safe(.2+v*.6,.2)+')';
      ctx.lineWidth=safe((r1-r0)*1.3+.5,.5);ctx.stroke();
    }
    ctx.restore();
    var rot2=-_phase*.3;
    ctx.save();ctx.translate(cx,cy);ctx.scale(mx,my);
    for(var i=0;i<24;i++){
      var angle=(i/24)*Math.PI*2-Math.PI/2+rot2;
      var v=safe((fd[Math.floor(i*fd.length/24+fd.length/2)]||0)/255,0);
      if(v<0.03)continue;
      var r0=safe(pulse*1.28,pulse);
      ctx.beginPath();ctx.arc(0,0,safe(r0+v*pulse*.35,r0),angle-Math.PI*2/24*.4,angle+Math.PI*2/24*.4);
      ctx.strokeStyle='hsla('+((h2+i*10)%360)+',100%,72%,'+safe(.14+v*.45,.14)+')';
      ctx.lineWidth=safe(v*pulse*.09+.6,.6);ctx.stroke();
    }
    ctx.restore();
  }catch(e){}}
  // core glow
  ctx.save();ctx.translate(cx,cy);ctx.scale(mx,my);
  var cg=ctx.createRadialGradient(0,0,0,0,0,pulse*.55);
  cg.addColorStop(0,'hsla('+h1+',100%,95%,'+safe(.7+_rms*.3,.6)+')');
  cg.addColorStop(.25,'hsla('+h1+',100%,75%,'+safe(.4+_rms*.3,.3)+')');
  cg.addColorStop(.6,'hsla('+h2+',100%,60%,'+safe(.15+_rms*.15,.1)+')');
  cg.addColorStop(1,'transparent');
  ctx.fillStyle=cg;ctx.beginPath();ctx.arc(0,0,pulse*.55,0,Math.PI*2);ctx.fill();
  ctx.restore();
  // corona
  for(var k=3;k>=1;k--){
    ctx.save();ctx.translate(cx,cy);ctx.scale(mx,my);
    var cg2=ctx.createRadialGradient(0,0,pulse*.4,0,0,pulse*(2+k*.6));
    cg2.addColorStop(0,'hsla('+h1+',100%,60%,'+(0.05/k)+')');cg2.addColorStop(.5,'hsla('+h2+',100%,60%,'+(0.02/k)+')');cg2.addColorStop(1,'transparent');
    ctx.fillStyle=cg2;ctx.beginPath();ctx.arc(0,0,pulse*(2+k*.6),0,Math.PI*2);ctx.fill();ctx.restore();
  }
  // signal lines from nodes
  for(var ni=0;ni<ST.nodes.length;ni++){var n=ST.nodes[ni];if(!n.active)continue;try{
    var pos=npos(n);var dx=cx-pos.x,dy=cy-pos.y,d=Math.sqrt(dx*dx+dy*dy);if(!d||!isFinite(d))continue;
    var nx2=dx/d,ny2=dy/d;
    var x0=safe(pos.x+nx2*8,cx),y0=safe(pos.y+ny2*8,cy);
    var x1=safe(cx-nx2*pulse*.4,cx),y1=safe(cy-ny2*pulse*.4,cy);
    var lg=ctx.createLinearGradient(x0,y0,x1,y1);
    lg.addColorStop(0,NCOLS_A[ni]+'.0)');lg.addColorStop(.5,NCOLS_A[ni]+safe(.35+n.rms,.2)+')');lg.addColorStop(1,NCOLS_A[ni]+'.04)');
    ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);ctx.strokeStyle=lg;ctx.lineWidth=safe(.8+n.rms*2.5,.5);ctx.stroke();
  }catch(e){}}
}

// ── IMMERSIVE NODE FIELDS ─────────────────────
function drawNodes(rms){
  if(!LAYERS.nodes)return;
  for(var ni=0;ni<ST.nodes.length;ni++){
    var n=ST.nodes[ni];
    var nr=safe(n.an?getRMS(n.an):0,0);n.rms=nr;
    var col=NCOLS[ni],ca=NCOLS_A[ni];
    var nfx=NODE_FX[ni];
    var field=NODE_FIELDS[ni];
    var pos=npos(n);
    var tiltX=n.panX*W*.12,tiltY=-n.panY*H*.08;
    var maxPts=Math.floor(field.length*(n.active?(.3+NODE_DENSITY*.7):(.05+NODE_DENSITY*.12)));
    for(var pi=0;pi<maxPts;pi++){
      var p=field[pi];
      p.bx=(p.bx+p.vx*(1+nr*3)+1)%1;p.by=(p.by+p.vy*(1+nr*2)+1)%1;p.phase+=.008+nr*.04;
      var perspective=1/(1.8-p.z*.4);
      var sx=safe((p.bx-.5)*W*1.6*perspective+W/2+tiltX*p.z,W/2);
      var sy=safe((p.by-.5)*H*1.6*perspective+H/2+tiltY*p.z,H/2);
      var sz=safe(p.sz*perspective*(n.active?1+nr*2:.6),.3);
      var br=p.bright*(n.active?.4+nr*.8+Math.sin(p.phase)*.2:.08);br=safe(br,.05);
      if(n.active&&br>0.35&&sz>1.5){
        var gg=ctx.createRadialGradient(sx,sy,0,sx,sy,sz*5);gg.addColorStop(0,ca+safe(br*.4,.1)+')');gg.addColorStop(1,'transparent');ctx.fillStyle=gg;ctx.beginPath();ctx.arc(sx,sy,sz*5,0,Math.PI*2);ctx.fill();
      }
      ctx.beginPath();ctx.arc(sx,sy,Math.max(.3,sz),0,Math.PI*2);ctx.fillStyle=col;ctx.globalAlpha=safe(br,.05);ctx.fill();ctx.globalAlpha=1;
    }
    if(n.active&&nr>0.02){
      var wash=ctx.createRadialGradient(pos.x,pos.y,0,pos.x,pos.y,Math.max(W,H)*.8);
      wash.addColorStop(0,ca+safe(nr*.06,.02)+')');wash.addColorStop(1,'transparent');ctx.fillStyle=wash;ctx.fillRect(0,0,W,H);
    }
    if(n.active&&nr>0.12&&nfx.peakCD<=0){
      nfx.peakCD=5;var count=Math.floor(6+nr*20);
      for(var k=0;k<count;k++){var a=Math.random()*Math.PI*2,spd=3+Math.random()*8+nr*10;nfx.sparks.push({x:pos.x,y:pos.y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:1,decay:.03+Math.random()*.04,sz:Math.random()*3+.5});}
    }
    if(nfx.peakCD>0)nfx.peakCD--;
    if(n.active&&nr>0.04&&Math.random()<nr*.3)nfx.waves.push({r:4,maxR:80+nr*120,life:1,decay:.02+nr*.025});
    nfx.waves=nfx.waves.filter(function(w){
      w.r+=3+nr*4;w.life-=w.decay;if(w.life<=0||w.r>w.maxR)return false;
      ctx.beginPath();ctx.arc(safe(pos.x,W/2),safe(pos.y,H/2),safe(w.r,8),0,Math.PI*2);
      ctx.strokeStyle=ca+safe(w.life*.2,.04)+')';ctx.lineWidth=safe(1.5*w.life,.3);ctx.stroke();return true;
    });
    nfx.sparks=nfx.sparks.filter(function(sp){
      sp.x+=sp.vx;sp.y+=sp.vy;sp.vx*=.94;sp.vy*=.94;sp.vy+=.08;sp.life-=sp.decay;
      if(sp.life<=0)return false;var r=safe(sp.sz*sp.life,.2);if(r<.1)return false;
      ctx.beginPath();ctx.arc(safe(sp.x,pos.x),safe(sp.y,pos.y),r,0,Math.PI*2);ctx.fillStyle=col;ctx.globalAlpha=safe(sp.life*.9,.4);ctx.fill();ctx.globalAlpha=1;return true;
    });
    ctx.font="italic 700 8px 'JetBrains Mono',monospace";ctx.fillStyle=ca+(n.active?'.5':'.15')+')';ctx.textAlign='center';ctx.fillText(ni+1,safe(pos.x,W/2),safe(pos.y,H/2));
  }
}

// ── MAIN LOOP ─────────────────────────────────
function drawFrame(){
  try{_drawFrame();}catch(e){console.warn('err:',e&&e.message?e.message:e);}
  requestAnimationFrame(drawFrame);
}
function _drawFrame(){
  var now=performance.now(),dt=Math.min((now-_prev)/1000,.05);_prev=now;_phase+=dt;
  var rms=ST.audio.man?getRMS(ST.audio.man):0;ST.visual.rms=rms;
  tickLFOs(dt);tickSPal();tickFXLFO(dt);tickSeq(dt);checkAutoFX(rms);tickSL(dt);
  if(FX.trail>0.01){trailCtx.clearRect(0,0,W,H);trailCtx.drawImage(canvas,0,0);}
  drawBG();
  if(FX.trail>0.01){ctx.globalAlpha=FX.trail;ctx.drawImage(trailCanvas,0,0);ctx.globalAlpha=1;}
  var vigAmt=parseFloat((document.getElementById('vig-sl')||{value:'.78'}).value)||.78;
  var vig=ctx.createRadialGradient(W/2,H/2,H*.18,W/2,H/2,H*.82);vig.addColorStop(0,'transparent');vig.addColorStop(1,'rgba(0,0,0,'+vigAmt+')');ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);
  var bloomAmt=parseFloat((document.getElementById('bloom-sl')||{value:'0'}).value)||0;
  if(bloomAmt>0.01&&FX.trail>0.01){ctx.save();ctx.globalAlpha=bloomAmt*.15;ctx.globalCompositeOperation='screen';ctx.drawImage(trailCanvas,0,0);ctx.restore();}
  if(LAYERS.ptcl){
    var ps=ST.visual.ptcls,spd=1+rms*6;
    ps.forEach(function(p,i){
      p.x+=p.vx*spd;p.y+=p.vy*spd;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
      for(var j=i+1;j<Math.min(i+7,ps.length);j++){var q=ps[j],dx=p.x-q.x,dy=p.y-q.y,d=Math.sqrt(dx*dx+dy*dy);if(d<110){ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);ctx.strokeStyle='rgba(153,68,255,'+(.11*(1-d/110)).toFixed(3)+')';ctx.lineWidth=.4;ctx.stroke();}}
      ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fillStyle=p.col;ctx.globalAlpha=.45;ctx.fill();ctx.globalAlpha=1;
    });
  }
  drawOrb(rms);drawNodes(rms);
  // explosion + shockwaves
  FX.explosionParts=FX.explosionParts.filter(function(p){
    p.x+=p.vx;p.y+=p.vy;p.vy+=.18;p.vx*=.97;p.life-=p.decay;if(p.life<=0)return false;
    var r=safe(p.sz*p.life,.2);if(r<.1)return false;
    var tg=ctx.createRadialGradient(safe(p.x,W/2),safe(p.y,H/2),0,safe(p.x,W/2),safe(p.y,H/2),r*3);
    tg.addColorStop(0,p.col);tg.addColorStop(1,'transparent');
    ctx.fillStyle=tg;ctx.globalAlpha=safe(p.life*.5,.2);ctx.beginPath();ctx.arc(safe(p.x,W/2),safe(p.y,H/2),r*3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(safe(p.x,W/2),safe(p.y,H/2),r,0,Math.PI*2);ctx.fillStyle='#fff';ctx.globalAlpha=safe(p.life*.9,.4);ctx.fill();ctx.globalAlpha=1;return true;
  });
  if(!FX.shockwaves)FX.shockwaves=[];
  FX.shockwaves=FX.shockwaves.filter(function(sw){
    sw.r+=8+sw.r*.04;sw.life-=sw.decay;if(sw.life<=0||sw.r>sw.maxR)return false;
    ctx.beginPath();ctx.arc(safe(sw.x,W/2),safe(sw.y,H/2),safe(sw.r,10),0,Math.PI*2);
    ctx.strokeStyle=sw.col;ctx.lineWidth=safe(3*sw.life,.5);ctx.globalAlpha=safe(sw.life*.6,.1);ctx.stroke();ctx.globalAlpha=1;return true;
  });
  FX.shatterParts=FX.shatterParts.filter(function(p){
    p.x+=p.vx;p.y+=p.vy;p.rot+=p.rotV;p.life-=p.decay;p.vx*=.96;p.vy*=.96;if(p.life<=0)return false;
    ctx.save();ctx.translate(safe(p.x,W/2),safe(p.y,H/2));ctx.rotate(p.rot);ctx.beginPath();
    for(var pi=0;pi<p.pts;pi++){var a2=(pi/p.pts)*Math.PI*2;var ri=p.radii[pi]*p.life;if(pi===0)ctx.moveTo(Math.cos(a2)*ri,Math.sin(a2)*ri);else ctx.lineTo(Math.cos(a2)*ri,Math.sin(a2)*ri);}
    ctx.closePath();ctx.fillStyle=p.col;ctx.globalAlpha=safe(p.life*.3,.08);ctx.fill();ctx.strokeStyle=p.col;ctx.lineWidth=1;ctx.globalAlpha=safe(p.life*.55,.08);ctx.stroke();ctx.restore();return true;
  });
  if(FX.vortexFrames>0){FX.vortexAngle+=.08;FX.vortexFrames--;for(var i=0;i<8;i++){var a=FX.vortexAngle+i*Math.PI/4,vr=80+i*30+Math.sin(_phase+i)*(FX.vortexFrames*2);ctx.beginPath();ctx.arc(W/2+Math.cos(a)*vr,H/2+Math.sin(a)*vr,4,0,Math.PI*2);ctx.fillStyle=NCOLS[i];ctx.globalAlpha=FX.vortexFrames/90*.7;ctx.fill();ctx.globalAlpha=1;}}
  if(FX.strobeCount>0){FX.strobeCount--;if(FX.strobeCount%2===0){ctx.fillStyle='rgba(255,255,255,.15)';ctx.fillRect(0,0,W,H);}}
  if(FX.invertFrames>0){FX.invertFrames--;ctx.save();ctx.globalCompositeOperation='difference';ctx.fillStyle='rgba(255,255,255,1)';ctx.fillRect(0,0,W,H);ctx.restore();}
  if(FX.glitchFrames>0){
    FX.glitchSlices.forEach(function(sl){
      ctx.save();
      if(sl.type===0){ctx.globalCompositeOperation='screen';ctx.fillStyle='rgba(0,255,255,.10)';ctx.fillRect(sl.dx+6,sl.y,W,sl.h);ctx.fillStyle='rgba(255,0,255,.08)';ctx.fillRect(sl.dx-6,sl.y,W,sl.h);ctx.fillStyle='rgba(255,255,0,.05)';ctx.fillRect(sl.dx,sl.y+sl.h*.3,W,sl.h*.4);}
      else if(sl.type===1){ctx.globalCompositeOperation='screen';ctx.fillStyle='hsla('+Math.floor(Math.random()*360)+',100%,60%,.06)';ctx.fillRect(0,sl.y,W,sl.h);}
      else if(sl.type===2){ctx.globalCompositeOperation='screen';ctx.fillStyle='rgba(0,255,180,.08)';ctx.fillRect(sl.dx*1.5,sl.y,W*.6,sl.h*.5);ctx.fillStyle='rgba(255,0,100,.06)';ctx.fillRect(-sl.dx,sl.y+sl.h*.5,W*.6,sl.h*.5);}
      else{ctx.globalCompositeOperation='difference';ctx.fillStyle='rgba(255,255,255,.15)';ctx.fillRect(0,sl.y,W,sl.h);}
      ctx.restore();
    });
    if(FX.glitchFrames%7===0){ctx.save();ctx.globalAlpha=.04;ctx.fillStyle=NCOLS[Math.floor(Math.random()*8)];ctx.fillRect(0,0,W,H);ctx.restore();}
    FX.glitchFrames--;if(!FX.glitchFrames)FX.glitchSlices=[];
  }
  if(FX.chroma>0.01&&FX.trail>0.01){ctx.save();ctx.globalAlpha=FX.chroma*.25;ctx.globalCompositeOperation='screen';ctx.drawImage(trailCanvas,-FX.chroma*10,0);ctx.drawImage(trailCanvas,FX.chroma*10,0);ctx.restore();}
  if(FX.noise>0.01){for(var i=0;i<Math.floor(FX.noise*400);i++){ctx.fillStyle='rgba('+(Math.random()*255|0)+','+(Math.random()*255|0)+','+(Math.random()*255|0)+','+FX.noise*.4+')';ctx.fillRect(Math.random()*W,Math.random()*H,2,2);}}
  if(FX.hue>0.01){ctx.save();ctx.globalAlpha=FX.hue*.35;ctx.globalCompositeOperation='hue';ctx.fillStyle='hsl('+FX.colorShiftHue+',100%,50%)';ctx.fillRect(0,0,W,H);ctx.restore();}
  if(FX.zoom>0.01&&FX.trail>0.01){ctx.save();ctx.translate(W/2,H/2);ctx.scale(1+FX.zoom*rms*.15,1+FX.zoom*rms*.15);ctx.translate(-W/2,-H/2);ctx.globalAlpha=.28;ctx.drawImage(trailCanvas,0,0);ctx.restore();}
  for(var sy=0;sy<H;sy+=4){ctx.fillStyle='rgba(0,0,0,.05)';ctx.fillRect(0,sy,W,1.5);}
  ctx.fillStyle='rgba(0,255,255,.025)';ctx.fillRect(0,(_phase*38)%H,W,2);
  // text overlays
  ST.visual.texts=ST.visual.texts.filter(function(tx){
    if(tx.ph==='in'){tx.a=Math.min(1,tx.a+.05);tx.f++;if(tx.f>18)tx.ph='hold';}
    else if(tx.ph==='hold'){tx.hold-=dt;if(tx.hold<0)tx.ph='out';}
    else{tx.a=Math.max(0,tx.a-.04);if(tx.a<=0)return false;}
    var txX=safe(W*(tx.xf||.5),W/2),txY=safe(H*(tx.yf||.78),H*.78);
    var sz=tx.size||13,wt=tx.weight||300,col=tx.color||'#ffffff',anim=tx.anim||'fade';
    var flickerAlpha=tx.a*(tx.opacity||.88);
    if(anim==='flicker'){tx._flicker=(tx._flicker||0)+1;if(tx._flicker%3===0)flickerAlpha*=(Math.random()>.3?1:.1);}
    if(anim==='slide')txY+=( 1-tx.a)*18;
    ctx.save();ctx.globalAlpha=flickerAlpha;
    var displayTxt=tx.txt;
    if(anim==='typewriter'){tx._chars=Math.min(tx.txt.length,Math.floor(tx.f*1.2));displayTxt=tx.txt.substring(0,tx._chars)+(tx._chars<tx.txt.length?'_':'');}
    else if(anim==='glitch'&&tx.ph==='in'){var gc='▓░▒█■□';var res=Math.floor(tx.a*tx.txt.length);displayTxt='';for(var ci=0;ci<tx.txt.length;ci++)displayTxt+=ci<res?tx.txt[ci]:gc[Math.floor(Math.random()*gc.length)];}
    if(tx.sys){
      ctx.font='italic '+wt+' '+sz+'px \'JetBrains Mono\',monospace';
      if(tx.color&&tx.color!=='#ffffff'){ctx.fillStyle=tx.color;ctx.textAlign='center';ctx.fillText(displayTxt,txX,txY);}
      else{var gd=ctx.createLinearGradient(txX-80,0,txX+80,0);gd.addColorStop(0,'#00ffff');gd.addColorStop(.5,'#9944ff');gd.addColorStop(1,'#ff00ff');ctx.fillStyle=gd;ctx.textAlign='center';ctx.fillText(displayTxt,txX,txY);ctx.globalAlpha=flickerAlpha*.18;ctx.fillStyle='rgba(0,255,255,1)';ctx.fillText(displayTxt,txX+2,txY);}
    } else {
      ctx.font='italic '+wt+' '+sz+'px \'JetBrains Mono\',monospace';ctx.fillStyle=col;ctx.textAlign='center';ctx.fillText(displayTxt,txX,txY);
    }
    ctx.restore();return true;
  });
  if(ST.playing){var elapsed=performance.now()/1000-ST._ps+ST._tlo;ST.t=Math.min(elapsed,ST.dur);updTime();if(ST.t>=ST.dur)stopAll();}
}

// ── TRANSPORT ─────────────────────────────────
function togPlay(){initAC();ST.audio.ctx.resume();if(ST.playing){ST._tlo=ST.t;ST.playing=false;document.getElementById('bplay').textContent='▶';}else{ST._ps=performance.now()/1000;ST.playing=true;document.getElementById('bplay').textContent='⏸';}}
function stopAll(){ST.playing=false;ST._tlo=0;ST.t=0;document.getElementById('bplay').textContent='▶';updTime();ST.nodes.forEach(function(_,i){stopNode(i);});}
function scrub(e){var r=document.getElementById('tlbar').getBoundingClientRect();ST.t=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width))*ST.dur;ST._tlo=ST.t;ST._ps=performance.now()/1000;updTime();}
function updTime(){var t=ST.t,f=t/ST.dur;document.getElementById('ttime').textContent=fmtT(t);document.getElementById('tlprog').style.width=(f*100)+'%';document.getElementById('tlhead').style.left=(f*100)+'%';}
function setDur(v){ST.dur=Math.max(10,parseInt(v)||180);var inp=document.getElementById('dur-inp');if(inp&&inp!==document.activeElement)inp.value=ST.dur;}
function togRec(){
  initAC();ST.audio.ctx.resume();var btn=document.getElementById('brec');
  if(ST.recording){ST.rec.rec.stop();ST.recording=false;btn.classList.remove('reca');document.getElementById('tmode').textContent='PERF';}
  else{
    var cs=canvas.captureStream(60);var tracks=cs.getVideoTracks().concat(ST.audio.rdest.stream.getAudioTracks());
    var combined=new MediaStream(tracks);ST.rec.chunks=[];
    var rec=new MediaRecorder(combined,{mimeType:'video/webm;codecs=vp9,opus',videoBitsPerSecond:8000000});
    rec.ondataavailable=function(e){ST.rec.chunks.push(e.data);};
    rec.onstop=function(){var b=new Blob(ST.rec.chunks,{type:'video/webm'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='spxx_'+Date.now()+'.webm';a.click();};
    rec.start();ST.rec.rec=rec;ST.recording=true;btn.classList.add('reca');document.getElementById('tmode').textContent='REC';
  }
}
function startRender(){stopAll();setTimeout(function(){togRec();setTimeout(function(){togPlay();},500);setTimeout(function(){if(ST.recording)togRec();},ST.dur*1000+1000);},300);}
function setFmt(f){ST.fmt=f;document.getElementById('fmt169').classList.toggle('on',f==='16:9');document.getElementById('fmt916').classList.toggle('on',f==='9:16');}

// ── NODE UI ───────────────────────────────────
function buildNodes(){
  var cont=document.getElementById('nodes-panel');cont.innerHTML='';
  for(var i=0;i<ST.nodes.length;i++){
    var fi=document.createElement('input');fi.type='file';fi.id='fi-'+i;fi.accept='.mp3,.wav,.m4a,.aiff,.aif,.caf,audio/*';fi.style.display='none';
    fi.onchange=(function(idx){return function(e){if(e.target.files[0])onFile(idx,e.target.files[0]);};})(i);
    document.getElementById('fi-wrap').appendChild(fi);
    var d=document.createElement('div');d.className='ns';d.id='ns-'+i;
    d.innerHTML='<div class="nh">'
      +'<span class="nnum" style="color:'+NCOLS[i]+'">'+(i+1)+'</span>'
      +'<input type="color" value="'+NCOLS[i]+'" style="width:18px;height:18px;border:none;background:transparent;cursor:pointer;border-radius:3px;padding:0;flex-shrink:0" data-ncol="'+i+'">'
      +'<span class="nname" id="nn-'+i+'">— empty —</span>'
      +'<button id="mute-'+i+'" style="padding:1px 4px;font-family:JetBrains Mono,monospace;font-style:italic;font-size:7px;border:1px solid var(--b1);background:transparent;color:rgba(255,255,255,.28);border-radius:3px;cursor:pointer;flex-shrink:0" onclick="muteNode('+i+')">m</button>'
      +'<button id="solo-'+i+'" style="padding:1px 4px;font-family:JetBrains Mono,monospace;font-style:italic;font-size:7px;border:1px solid var(--b1);background:transparent;color:rgba(255,255,255,.28);border-radius:3px;cursor:pointer;flex-shrink:0" onclick="soloNode('+i+')">S</button>'
      +'<div class="ntog" id="nt-'+i+'" style="color:'+NCOLS[i]+'" onclick="togNode('+i+')"></div></div>'
      +'<button class="nload" onclick="loadSample('+i+')">LOAD SAMPLE</button>'
      +'<div class="cr"><span class="cl">VOL</span><input type="range" data-k="vol" min="0" max="1" step=".01" value=".8" oninput="setNP('+i+',\'vol\',this.value);this.nextElementSibling.textContent=parseFloat(this.value).toFixed(2)"><span class="cv">.80</span></div>'
      +'<div class="cr"><span class="cl">PAN X</span><input type="range" data-k="panX" min="-1" max="1" step=".01" value="0" oninput="setNP('+i+',\'panX\',this.value);this.nextElementSibling.textContent=parseFloat(this.value).toFixed(2)"><span class="cv">.00</span></div>'
      +'<div class="cr"><span class="cl">PAN Y</span><input type="range" data-k="panY" min="-1" max="1" step=".01" value="0" oninput="setNP('+i+',\'panY\',this.value);this.nextElementSibling.textContent=parseFloat(this.value).toFixed(2)"><span class="cv">.00</span></div>'
      +'<div class="cr"><span class="cl">PITCH</span><input type="range" data-k="pitch" min="-24" max="24" step="1" value="0" oninput="setNP('+i+',\'pitch\',this.value);this.nextElementSibling.textContent=(this.value>0?\'+\':\'\')+parseInt(this.value)"><span class="cv">0</span></div>'
      +'<div class="cr"><span class="cl" style="color:var(--cy)">FILTER</span><input type="range" data-k="filter" min="80" max="20000" step="10" value="20000" style="accent-color:var(--cy)" oninput="setNP('+i+',\'filter\',this.value);this.nextElementSibling.textContent=parseFloat(this.value)>=10000?(parseFloat(this.value)/1000).toFixed(1)+\'k\':(parseFloat(this.value)|0)+\'\'"><span class="cv">20k</span></div>'
      +'<div class="hrtf-row"><button class="tog on" id="hm-man-'+i+'" onclick="setHRTF('+i+',\'manual\')">MANUAL</button><button class="tog" id="hm-orb-'+i+'" onclick="setHRTF('+i+',\'orbit\')">ORBIT</button><button class="tog" id="hm-lis-'+i+'" onclick="setHRTF('+i+',\'lissajous\')">LISSA</button></div>'
      +'<div id="ac-'+i+'" style="display:none">'
      +'<div class="cr"><span class="cl">R</span><input type="range" min=".1" max="1" step=".05" value=".7" oninput="ST.nodes['+i+'].orbitR=parseFloat(this.value);this.nextElementSibling.textContent=parseFloat(this.value).toFixed(2)"><span class="cv">.70</span></div>'
      +'<div class="cr"><span class="cl">SPD</span><input type="range" min=".02" max="2" step=".02" value=".3" oninput="ST.nodes['+i+'].orbitSpd=parseFloat(this.value);this.nextElementSibling.textContent=parseFloat(this.value).toFixed(2)"><span class="cv">.30</span></div></div>'
      +'<div class="lfo-row"><span class="lfo-lbl">LFO</span>'
      +'<select class="mini" data-lw="'+i+'"><option value="sin">SIN</option><option value="tri">TRI</option><option value="sqr">SQR</option><option value="saw">SAW</option></select>'
      +'<select class="mini" data-lt="'+i+'"><option value="panX">X</option><option value="panY">Y</option><option value="vol">VOL</option><option value="pitch">PITCH</option></select>'
      +'<button class="tog" id="lfo-'+i+'" onclick="togLFO('+i+')">OFF</button></div>'
      +'<div class="cr"><span class="cl">RATE</span><input type="range" min=".02" max="4" step=".02" value=".5" data-lr="'+i+'"><span class="cv">.50</span></div>'
      +'<div class="cr"><span class="cl">DEPTH</span><input type="range" min="0" max="1" step=".01" value=".5" data-ld="'+i+'"><span class="cv">.50</span></div>';
    cont.appendChild(d);
    d.querySelector('[data-ncol]').addEventListener('input',function(e){var idx=parseInt(e.target.getAttribute('data-ncol'));NCOLS[idx]=e.target.value;NCOLS_A[idx]=hexRgba(e.target.value);var nn=document.querySelector('#ns-'+idx+' .nnum');if(nn)nn.style.color=e.target.value;var nt=document.getElementById('nt-'+idx);if(nt)nt.style.color=e.target.value;});
    d.querySelectorAll('[data-lw]').forEach(function(el){el.addEventListener('change',function(){ST.nodes[parseInt(el.getAttribute('data-lw'))].lfo.wave=el.value;});});
    d.querySelectorAll('[data-lt]').forEach(function(el){el.addEventListener('change',function(){ST.nodes[parseInt(el.getAttribute('data-lt'))].lfo.target=el.value;});});
    d.querySelectorAll('[data-lr]').forEach(function(el){el.addEventListener('input',function(){var ni2=parseInt(el.getAttribute('data-lr'));ST.nodes[ni2].lfo.rate=parseFloat(el.value);el.nextElementSibling.textContent=parseFloat(el.value).toFixed(2);});});
    d.querySelectorAll('[data-ld]').forEach(function(el){el.addEventListener('input',function(){var ni2=parseInt(el.getAttribute('data-ld'));ST.nodes[ni2].lfo.depth=parseFloat(el.value);el.nextElementSibling.textContent=parseFloat(el.value).toFixed(2);});});
  }
}
function setHRTF(i,mode){ST.nodes[i].hrtfMode=mode;['manual','orbit','lissajous'].forEach(function(m){var b=document.getElementById('hm-'+m.substring(0,3)+'-'+i);if(b)b.classList.toggle('on',m===mode);});document.getElementById('ac-'+i).style.display=mode!=='manual'?'block':'none';}
function togLFO(i){var n=ST.nodes[i];n.lfo.on=!n.lfo.on;var btn=document.getElementById('lfo-'+i);btn.classList.toggle('on',n.lfo.on);btn.textContent=n.lfo.on?'ON':'OFF';if(!n.lfo.on&&n.gain)n.gain.gain.setTargetAtTime(n.vol,ST.audio.ctx.currentTime,.1);}
function updNUI(i){var n=ST.nodes[i];document.getElementById('ns-'+i).classList.toggle('act',n.active);document.getElementById('nt-'+i).classList.toggle('on',n.active);var nm=document.getElementById('nn-'+i);if(nm&&n.name)nm.textContent=n.name;}

// ── PANELS / TABS ─────────────────────────────
function togPanel(side){var el=document.getElementById('p'+side);el.classList.toggle('col');var btn=document.getElementById('pt'+side);if(side==='l')btn.textContent=el.classList.contains('col')?'▶':'◀';else btn.textContent=el.classList.contains('col')?'◀':'▶';}
function swTab(name,el){document.querySelectorAll('#pr .tab').forEach(function(t){t.classList.remove('on');});document.querySelectorAll('#pr .pane').forEach(function(p){p.classList.remove('on');});el.classList.add('on');document.getElementById('pane-'+name).classList.add('on');}

// ── INIT ──────────────────────────────────────
buildNodes();initPtcls();buildFXCont();renderBgPanel();
addScene();addScene();
addTB();addTB();
renderScenes();renderTB();renderSeq();renderSL();
drawFrame();
</script>
