<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>SpoonexXset · Phase 1</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=JetBrains+Mono:ital,wght@1,300;1,400;1,700&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;height:100%;overflow:hidden;background:#000}
  body{
    background:#000;
    background-image:radial-gradient(circle,#0f0f0f 1px,transparent 1px);
    background-size:32px 32px;
    font-family:'Inter',sans-serif;
    color:#fff;
    display:flex;
    flex-direction:column;
    user-select:none;
  }

  /* HEADER */
  header{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 24px 12px;
    border-bottom:1px solid rgba(255,255,255,.06);
    flex-shrink:0;
  }
  .logo{display:flex;align-items:baseline;gap:5px}
  .logo-spuk{font-family:'JetBrains Mono',monospace;font-style:italic;font-weight:700;font-size:15px;letter-spacing:-.01em}
  .logo-lab{font-family:'JetBrains Mono',monospace;font-style:italic;font-weight:300;font-size:15px;color:#00ffff;letter-spacing:-.01em}
  .logo-sub{font-family:'JetBrains Mono',monospace;font-style:italic;font-size:9px;color:rgba(255,255,255,.25);margin-left:10px;letter-spacing:.05em}
  .status-row{display:flex;align-items:center;gap:12px}
  .status-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.15);transition:all .4s}
  .status-dot.active{background:#00ffff;box-shadow:0 0 10px #00ffff}
  .stage-label{font-family:'JetBrains Mono',monospace;font-style:italic;font-size:10px;color:rgba(255,255,255,.3);letter-spacing:.08em;min-width:90px;text-align:right}

  /* CANVAS */
  #nebula{display:block;width:100%;flex-shrink:0}

  /* MAIN */
  main{flex:1;display:flex;flex-direction:column;padding:16px 24px;gap:14px;overflow:hidden}

  /* SAMPLE SLOTS */
  .slots{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .slot{
    background:rgba(255,255,255,.03);
    border:1px solid rgba(255,255,255,.07);
    border-radius:8px;
    padding:10px 12px;
    cursor:pointer;
    transition:border-color .2s, background .2s;
    position:relative;
    overflow:hidden;
  }
  .slot.loaded{border-color:rgba(0,255,255,.25)}
  .slot.playing{border-color:#00ffff;background:rgba(0,255,255,.06)}
  .slot-label{font-family:'JetBrains Mono',monospace;font-style:italic;font-size:9px;color:rgba(255,255,255,.3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
  .slot-name{font-size:11px;color:rgba(255,255,255,.7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .slot-empty{font-family:'JetBrains Mono',monospace;font-style:italic;font-size:10px;color:rgba(255,255,255,.18)}
  .waveform{width:100%;height:28px;margin-top:6px;border-radius:3px;overflow:hidden}
  .slot-play-indicator{position:absolute;top:0;left:0;height:2px;background:linear-gradient(90deg,#00ffff,#9944ff);width:0;transition:width .1s linear}
  .file-input{display:none}

  /* SYNTH ROW */
  .synth-row{display:flex;gap:12px;align-items:stretch}

  /* SUB */
  .sub-block{
    background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
    border-radius:8px;padding:12px 16px;display:flex;flex-direction:column;gap:8px;min-width:160px;
  }
  .sub-block.active{border-color:rgba(153,68,255,.4)}
  .block-title{font-family:'JetBrains Mono',monospace;font-style:italic;font-size:9px;color:rgba(255,255,255,.3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}

  /* NOISE */
  .noise-block{
    background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
    border-radius:8px;padding:12px 16px;flex:1;display:flex;flex-direction:column;gap:8px;
  }
  .noise-block.active{border-color:rgba(255,0,255,.3)}

  /* CONTROLS */
  .ctrl-row{display:flex;align-items:center;gap:10px}
  .ctrl-label{font-family:'JetBrains Mono',monospace;font-style:italic;font-size:9px;color:rgba(255,255,255,.3);min-width:28px;letter-spacing:.05em}
  .ctrl-val{font-family:'JetBrains Mono',monospace;font-style:italic;font-size:10px;color:#00ffff;min-width:36px;text-align:right}
  input[type=range]{
    -webkit-appearance:none;appearance:none;
    flex:1;height:3px;background:rgba(255,255,255,.1);border-radius:2px;outline:none;cursor:pointer;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;width:14px;height:14px;border-radius:50%;
    background:#00ffff;cursor:pointer;box-shadow:0 0 6px rgba(0,255,255,.5);
  }

  /* TOGGLE BTNS */
  .tog{
    background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
    color:rgba(255,255,255,.4);border-radius:5px;
    font-family:'JetBrains Mono',monospace;font-style:italic;font-size:10px;
    padding:6px 14px;cursor:pointer;transition:all .2s;letter-spacing:.05em;
  }
  .tog.on{background:rgba(0,255,255,.1);border-color:#00ffff44;color:#00ffff}
  .tog.on.mag{background:rgba(255,0,255,.1);border-color:rgba(255,0,255,.4);color:#ff00ff}
  .tog.on.vio{background:rgba(153,68,255,.12);border-color:rgba(153,68,255,.4);color:#9944ff}

  /* KILL */
  .kill{
    background:rgba(255,0,0,.08);border:1px solid rgba(255,0,0,.2);
    color:rgba(255,100,100,.7);border-radius:6px;
    font-family:'JetBrains Mono',monospace;font-style:italic;font-size:11px;
    padding:10px 24px;cursor:pointer;transition:all .2s;letter-spacing:.08em;margin-left:auto;
  }
  .kill:active{background:rgba(255,0,0,.2);color:#ff4444}

  /* UNLOCK OVERLAY */
  #unlock{
    position:fixed;inset:0;background:rgba(0,0,0,.92);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    z-index:100;cursor:pointer;gap:20px;
  }
  #unlock .u-title{font-family:'JetBrains Mono',monospace;font-style:italic;font-size:22px;letter-spacing:.08em}
  #unlock .u-sub{font-family:'JetBrains Mono',monospace;font-style:italic;font-size:11px;color:rgba(255,255,255,.35);letter-spacing:.1em}
  #unlock .u-btn{
    padding:16px 48px;border:1px solid #00ffff44;border-radius:8px;
    background:rgba(0,255,255,.08);color:#00ffff;
    font-family:'JetBrains Mono',monospace;font-style:italic;font-size:13px;letter-spacing:.1em;
    margin-top:8px;
  }

  /* GRADIENT TEXT */
  .grad{background:linear-gradient(90deg,#00ffff,#9944ff,#ff00ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:700;font-style:italic}
</style>
</head>
<body>

<div id="unlock">
  <div class="u-title"><span class="grad">SpoonexXset</span></div>
  <div class="u-sub">PHASE 1 · ANCLAJE</div>
  <div class="u-btn">INICIAR SESIÓN</div>
</div>

<header>
  <div class="logo">
    <span class="logo-spuk">SPUK</span>
    <span class="logo-lab">LAB</span>
    <span class="logo-sub">SpoonexXset · Phase 1</span>
  </div>
  <div class="status-row">
    <span class="stage-label" id="stageLbl">ANCLAJE</span>
    <div class="status-dot" id="statusDot"></div>
  </div>
</header>

<canvas id="nebula" height="120"></canvas>

<main>
  <!-- SAMPLE SLOTS -->
  <div class="slots" id="slots">
    <div class="slot" id="slot0" onclick="triggerSlot(0)">
      <input type="file" class="file-input" id="file0" accept="audio/*" onchange="loadSample(0,this)"/>
      <div class="slot-label">SAMPLE 01</div>
      <div class="slot-name slot-empty" id="name0">tap to load</div>
      <canvas class="waveform" id="wave0" height="28"></canvas>
      <div class="slot-play-indicator" id="ind0"></div>
    </div>
    <div class="slot" id="slot1" onclick="triggerSlot(1)">
      <input type="file" class="file-input" id="file1" accept="audio/*" onchange="loadSample(1,this)"/>
      <div class="slot-label">SAMPLE 02</div>
      <div class="slot-name slot-empty" id="name1">tap to load</div>
      <canvas class="waveform" id="wave1" height="28"></canvas>
      <div class="slot-play-indicator" id="ind1"></div>
    </div>
    <div class="slot" id="slot2" onclick="triggerSlot(2)">
      <input type="file" class="file-input" id="file2" accept="audio/*" onchange="loadSample(2,this)"/>
      <div class="slot-label">SAMPLE 03</div>
      <div class="slot-name slot-empty" id="name2">tap to load</div>
      <canvas class="waveform" id="wave2" height="28"></canvas>
      <div class="slot-play-indicator" id="ind2"></div>
    </div>
    <div class="slot" id="slot3" onclick="triggerSlot(3)">
      <input type="file" class="file-input" id="file3" accept="audio/*" onchange="loadSample(3,this)"/>
      <div class="slot-label">SAMPLE 04</div>
      <div class="slot-name slot-empty" id="name3">tap to load</div>
      <canvas class="waveform" id="wave3" height="28"></canvas>
      <div class="slot-play-indicator" id="ind3"></div>
    </div>
  </div>

  <!-- SYNTH ROW -->
  <div class="synth-row">

    <!-- SUB OSC -->
    <div class="sub-block" id="subBlock">
      <div class="block-title">SUB OSCILLATOR</div>
      <div class="ctrl-row">
        <span class="ctrl-label">hz</span>
        <input type="range" id="subFreq" min="28" max="110" value="55" oninput="updateSub()"/>
        <span class="ctrl-val" id="subFreqVal">55</span>
      </div>
      <div class="ctrl-row">
        <span class="ctrl-label">vol</span>
        <input type="range" id="subVol" min="0" max="100" value="60" oninput="updateSub()"/>
        <span class="ctrl-val" id="subVolVal">60</span>
      </div>
      <button class="tog vio" id="subTog" onclick="toggleSub()">SUB OFF</button>
    </div>

    <!-- NOISE -->
    <div class="noise-block" id="noiseBlock">
      <div class="block-title">STEREO NOISE</div>
      <div class="ctrl-row">
        <span class="ctrl-label">freq</span>
        <input type="range" id="noiseFreq" min="50" max="8000" value="800" oninput="updateNoise()"/>
        <span class="ctrl-val" id="noiseFreqVal">800</span>
      </div>
      <div class="ctrl-row">
        <span class="ctrl-label">q</span>
        <input type="range" id="noiseQ" min="0.5" max="20" step="0.1" value="3" oninput="updateNoise()"/>
        <span class="ctrl-val" id="noiseQVal">3.0</span>
      </div>
      <div class="ctrl-row">
        <span class="ctrl-label">vol</span>
        <input type="range" id="noiseVol" min="0" max="100" value="40" oninput="updateNoise()"/>
        <span class="ctrl-val" id="noiseVolVal">40</span>
      </div>
      <div style="display:flex;gap:8px;margin-top:2px;align-items:center">
        <button class="tog mag" id="noiseTog" onclick="toggleNoise()">NOISE OFF</button>
        <div style="flex:1"></div>
        <button class="kill" onclick="killAll()">■ KILL</button>
      </div>
    </div>

  </div>

  <!-- STAGE SELECTOR -->
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <span style="font-family:'JetBrains Mono',monospace;font-style:italic;font-size:9px;color:rgba(255,255,255,.25);letter-spacing:.1em;align-self:center;margin-right:4px">STAGE</span>
    <button class="tog on" id="stg0" onclick="setStage(0)">ANCLAJE</button>
    <button class="tog" id="stg1" onclick="setStage(1)">EXPLORACIÓN</button>
    <button class="tog" id="stg2" onclick="setStage(2)">DISRUPCIÓN</button>
    <button class="tog" id="stg3" onclick="setStage(3)">LIBERACIÓN</button>
    <button class="tog" id="stg4" onclick="setStage(4)">RETORNO</button>
  </div>
</main>

<script>
// ─── AUDIO ENGINE ─────────────────────────────────────────────
let ctx, masterGain, limiter;
let subOsc = null, subGain = null, subActive = false;
let noiseNode = null, noiseGain = null, noiseFilter = null, noiseActive = false;
let buffers = [null,null,null,null];
let voices = [];
const MAX_VOICES = 32;
let rms = 0;

const STAGES = [
  { name:"ANCLAJE",     subHz:40,  noiseFreq:300,  noiseQ:4  },
  { name:"EXPLORACIÓN", subHz:55,  noiseFreq:800,  noiseQ:3  },
  { name:"DISRUPCIÓN",  subHz:80,  noiseFreq:2000, noiseQ:2  },
  { name:"LIBERACIÓN",  subHz:110, noiseFreq:4000, noiseQ:1.5},
  { name:"RETORNO",     subHz:28,  noiseFreq:200,  noiseQ:6  },
];
let currentStage = 0;

function initAudio() {
  ctx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = ctx.createGain(); masterGain.gain.value = 0.85;
  limiter = ctx.createDynamicsCompressor();
  limiter.threshold.value = -3; limiter.knee.value = 2;
  limiter.ratio.value = 20; limiter.attack.value = 0.001; limiter.release.value = 0.1;
  masterGain.connect(limiter); limiter.connect(ctx.destination);
}

function makeSub() {
  if (subOsc) { try{subOsc.stop()}catch(e){} }
  subOsc = ctx.createOscillator();
  subGain = ctx.createGain();
  subOsc.type = 'sine';
  const hz = parseFloat(document.getElementById('subFreq').value);
  const vol = parseFloat(document.getElementById('subVol').value)/100 * 0.6;
  subOsc.frequency.value = hz;
  subGain.gain.value = vol;
  subOsc.connect(subGain); subGain.connect(masterGain);
  subOsc.start();
}

function toggleSub() {
  subActive = !subActive;
  const btn = document.getElementById('subTog');
  const blk = document.getElementById('subBlock');
  if (subActive) { makeSub(); btn.textContent='SUB ON'; btn.classList.add('on'); blk.classList.add('active'); }
  else { if(subOsc){try{subOsc.stop()}catch(e){} subOsc=null;} btn.textContent='SUB OFF'; btn.classList.remove('on'); blk.classList.remove('active'); }
}

function updateSub() {
  const hz = parseFloat(document.getElementById('subFreq').value);
  const vol = parseFloat(document.getElementById('subVol').value);
  document.getElementById('subFreqVal').textContent = hz;
  document.getElementById('subVolVal').textContent = vol;
  if (subActive && subOsc) { subOsc.frequency.setTargetAtTime(hz,ctx.currentTime,0.05); subGain.gain.setTargetAtTime(vol/100*0.6,ctx.currentTime,0.05); }
}

function makeNoise() {
  const bufSize = ctx.sampleRate * 2;
  const buf = ctx.createBuffer(2, bufSize, ctx.sampleRate);
  for (let c=0;c<2;c++) { const d=buf.getChannelData(c); let last=0; for(let i=0;i<bufSize;i++){const w=(Math.random()*2-1);last=(last+0.02*w)/1.02;d[i]=last*3.5;}}
  noiseNode = ctx.createBufferSource(); noiseNode.buffer = buf; noiseNode.loop = true;
  noiseFilter = ctx.createBiquadFilter(); noiseFilter.type='bandpass';
  noiseFilter.frequency.value = parseFloat(document.getElementById('noiseFreq').value);
  noiseFilter.Q.value = parseFloat(document.getElementById('noiseQ').value);
  noiseGain = ctx.createGain();
  noiseGain.gain.value = parseFloat(document.getElementById('noiseVol').value)/100*0.5;
  noiseNode.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(masterGain);
  noiseNode.start();
}

function toggleNoise() {
  noiseActive = !noiseActive;
  const btn=document.getElementById('noiseTog'); const blk=document.getElementById('noiseBlock');
  if (noiseActive) { makeNoise(); btn.textContent='NOISE ON'; btn.classList.add('on'); blk.classList.add('active'); }
  else { if(noiseNode){try{noiseNode.stop()}catch(e){} noiseNode=null;} btn.textContent='NOISE OFF'; btn.classList.remove('on'); blk.classList.remove('active'); }
}

function updateNoise() {
  const f=parseFloat(document.getElementById('noiseFreq').value);
  const q=parseFloat(document.getElementById('noiseQ').value);
  const v=parseFloat(document.getElementById('noiseVol').value);
  document.getElementById('noiseFreqVal').textContent=f;
  document.getElementById('noiseQVal').textContent=q.toFixed(1);
  document.getElementById('noiseVolVal').textContent=v;
  if(noiseActive&&noiseFilter){noiseFilter.frequency.setTargetAtTime(f,ctx.currentTime,0.05);noiseFilter.Q.setTargetAtTime(q,ctx.currentTime,0.05);}
  if(noiseActive&&noiseGain){noiseGain.gain.setTargetAtTime(v/100*0.5,ctx.currentTime,0.05);}
}

function loadSample(idx, input) {
  const file = input.files[0]; if(!file) return;
  const nameEl = document.getElementById('name'+idx);
  nameEl.textContent = file.name.replace(/\.[^/.]+$/,'');
  nameEl.classList.remove('slot-empty');
  document.getElementById('slot'+idx).classList.add('loaded');
  const reader = new FileReader();
  reader.onload = function(e) {
    const ab = e.target.result.slice(0);
    ctx.decodeAudioData(ab, function(buf) {
      buffers[idx] = buf;
      drawWaveform(idx, buf);
    }, function(err){ console.warn('decode error',err); });
  };
  reader.readAsArrayBuffer(file);
}

function triggerSlot(idx) {
  if (!buffers[idx]) { document.getElementById('file'+idx).click(); return; }
  if (voices.length >= MAX_VOICES) { const old=voices.shift(); try{old.stop()}catch(e){} }
  const src = ctx.createBufferSource();
  src.buffer = buffers[idx];
  const g = ctx.createGain(); g.gain.value = 0.8;
  src.connect(g); g.connect(masterGain);
  src.start();
  voices.push(src);
  document.getElementById('slot'+idx).classList.add('playing');
  src.onended = () => { document.getElementById('slot'+idx).classList.remove('playing'); voices = voices.filter(v=>v!==src); };
  rms = Math.min(1, rms + 0.3);
}

function killAll() {
  voices.forEach(v=>{try{v.stop()}catch(e){}});
  voices=[];
  if(subOsc){try{subOsc.stop()}catch(e){} subOsc=null; subActive=false; document.getElementById('subTog').textContent='SUB OFF'; document.getElementById('subTog').classList.remove('on'); document.getElementById('subBlock').classList.remove('active');}
  if(noiseNode){try{noiseNode.stop()}catch(e){} noiseNode=null; noiseActive=false; document.getElementById('noiseTog').textContent='NOISE OFF'; document.getElementById('noiseTog').classList.remove('on'); document.getElementById('noiseBlock').classList.remove('active');}
  document.getElementById('statusDot').classList.remove('active');
  rms = 0;
}

function setStage(i) {
  currentStage=i;
  const s=STAGES[i];
  document.getElementById('stageLbl').textContent=s.name;
  document.querySelectorAll('[id^=stg]').forEach((b,j)=>{b.classList.toggle('on',j===i);});
  document.getElementById('subFreq').value=s.subHz;
  document.getElementById('noiseFreq').value=s.noiseFreq;
  document.getElementById('noiseQ').value=s.noiseQ;
  updateSub(); updateNoise();
}

// ─── WAVEFORM DRAW ────────────────────────────────────────────
function drawWaveform(idx, buf) {
  const cvs = document.getElementById('wave'+idx);
  const ctx2 = cvs.getContext('2d');
  cvs.width = cvs.offsetWidth || 200;
  const data = buf.getChannelData(0);
  const step = Math.floor(data.length / cvs.width);
  const h = cvs.height;
  ctx2.clearRect(0,0,cvs.width,h);
  ctx2.strokeStyle='rgba(0,255,255,0.5)';
  ctx2.lineWidth=1;
  ctx2.beginPath();
  for(let x=0;x<cvs.width;x++){
    let max=0;
    for(let j=0;j<step;j++){const v=Math.abs(data[x*step+j]||0);if(v>max)max=v;}
    const y=h/2 - max*(h/2)*0.9;
    if(x===0)ctx2.moveTo(x,y); else ctx2.lineTo(x,y);
  }
  ctx2.stroke();
}

// ─── NEBULA CANVAS ────────────────────────────────────────────
const cvs = document.getElementById('nebula');
const c = cvs.getContext('2d');
let rings = [{r:20,speed:.4,phase:0},{r:40,speed:.25,phase:1.2},{r:60,speed:.15,phase:2.4}];
let animId;

function resizeCanvas(){
  cvs.width = cvs.offsetWidth;
}

function drawNebula(ts){
  const W=cvs.width, H=cvs.height, cx=W/2, cy=H/2;
  c.clearRect(0,0,W,H);

  // vignette
  const vg=c.createRadialGradient(cx,cy,0,cx,cy,W*0.5);
  vg.addColorStop(0,'transparent'); vg.addColorStop(1,'rgba(0,0,0,.5)');
  c.fillStyle=vg; c.fillRect(0,0,W,H);

  const t = ts*0.001;
  const pulse = 1 + rms*0.3;

  rings.forEach((ring,i)=>{
    ring.phase += ring.speed * 0.016;
    const r = ring.r * pulse;
    const alpha = 0.15 + rms*0.25;
    const colors=['rgba(0,255,255,','rgba(153,68,255,','rgba(255,0,255,'];
    c.beginPath();
    c.arc(cx + Math.sin(ring.phase)*8*rms, cy + Math.cos(ring.phase*0.7)*5*rms, r, 0, Math.PI*2);
    c.strokeStyle = colors[i] + alpha + ')';
    c.lineWidth = 1 + rms;
    c.stroke();
  });

  // center orb
  const og=c.createRadialGradient(cx,cy,0,cx,cy,18*pulse);
  og.addColorStop(0,'rgba(0,255,255,'+(0.12+rms*0.3)+')');
  og.addColorStop(1,'transparent');
  c.fillStyle=og; c.beginPath(); c.arc(cx,cy,18*pulse,0,Math.PI*2); c.fill();

  if(rms>0.01) rms *= 0.97; else rms=0;
  document.getElementById('statusDot').classList.toggle('active', rms>0.05 || subActive || noiseActive);
  animId = requestAnimationFrame(drawNebula);
}

// ─── INIT ────────────────────────────────────────────────────
document.getElementById('unlock').addEventListener('click', ()=>{
  initAudio();
  document.getElementById('unlock').style.display='none';
  resizeCanvas();
  requestAnimationFrame(drawNebula);
}, {once:true});

window.addEventListener('resize', ()=>{ resizeCanvas(); });
</script>
</body>
</html>
